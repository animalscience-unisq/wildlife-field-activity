<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WildWatch">
<meta name="theme-color" content="#0a1a0d">
<title>WildWatch — UniSQ Wildlife Field Activity</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* === RESET === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{height:100%;font-family:Georgia,serif;background:#0a1a0d;color:#e8f0e0;overflow:hidden}

/* === MAP === */
#map{position:fixed;inset:0;z-index:1}
.leaflet-container{background:#0d1f10!important}
.leaflet-control-zoom a{background:#0d2a14!important;color:#86efac!important;border-color:#1a4a22!important}

/* === TOP BAR === */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:10;
  background:linear-gradient(180deg,rgba(10,26,13,.97) 80%,transparent);
  padding-top:env(safe-area-inset-top,0px);
  pointer-events:none
}
#topbar-content{
  pointer-events:all;
  padding:10px 14px 12px
}
.tb-title{font-size:9px;letter-spacing:4px;color:#f59e0b;text-transform:uppercase}
.tb-heading{font-size:19px;font-weight:bold;color:#f0fdf4}
.score-row{display:flex;gap:6px;margin-top:8px}
.chip{flex:1;background:rgba(13,31,16,.95);border-radius:8px;padding:5px 4px;text-align:center}
.chip-label{font-size:7px;letter-spacing:2px;color:#4a7a4e;display:block}
.chip-val{font-size:15px;font-weight:bold;display:block}
.btn-row{display:flex;gap:6px;margin-top:8px}
.fbtn{
  flex:1;background:transparent;border:1px solid #1a4a22;
  border-radius:8px;padding:7px 2px;
  color:#4a7a4e;font-size:10px;cursor:pointer;
  font-family:Georgia,serif;
  -webkit-tap-highlight-color:transparent
}
.fbtn.on{background:#0d2a14;border-color:#22c55e;color:#86efac}
#menu-btn{
  flex-shrink:0;width:44px;
  background:#0d2a14;border:1px solid #22c55e;
  border-radius:8px;padding:7px;
  color:#86efac;font-size:20px;cursor:pointer;
  font-family:Georgia,serif;line-height:1;
  -webkit-tap-highlight-color:transparent
}

/* === SIDE DRAWER === */
#overlay{
  position:fixed;inset:0;z-index:20;
  background:rgba(0,0,0,.5);
  display:none;
  -webkit-tap-highlight-color:transparent
}
#overlay.on{display:block}
#drawer{
  position:fixed;top:0;right:0;bottom:0;z-index:21;
  width:min(300px,82vw);
  background:#0a1a0d;
  border-left:1px solid #1a4a22;
  display:flex;flex-direction:column;
  transform:translateX(110%);
  transition:transform .25s ease
}
#drawer.on{transform:translateX(0)}
#drawer-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:max(14px,env(safe-area-inset-top,14px)) 14px 12px;
  border-bottom:1px solid #1a4a22;
  flex-shrink:0
}
#drawer-title{font-size:12px;font-weight:bold;color:#86efac;letter-spacing:2px}
#drawer-close{
  background:transparent;border:1px solid #1a4a22;
  border-radius:8px;padding:5px 10px;
  color:#4a7a4e;font-size:13px;cursor:pointer;
  font-family:Georgia,serif;
  -webkit-tap-highlight-color:transparent
}
#drawer-body{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}
.drow{
  display:flex;align-items:center;gap:10px;
  background:#0d1a10;border-radius:10px;
  padding:10px 11px;margin-bottom:7px;
  cursor:pointer;border-left:3px solid #1a4a22;
  -webkit-tap-highlight-color:transparent
}
.drow:active{opacity:.7}
.drow-done{opacity:.6}
.drow-name{font-size:12px;font-weight:bold;color:#f0fdf4}
.drow-sub{font-size:10px;color:#6b9e70;margin-top:2px}
.drow-arr{font-size:14px;color:#4a7a4e;flex-shrink:0}
.dtag{font-size:9px;padding:2px 7px;border-radius:12px;display:inline-block;margin-top:3px;margin-right:3px}
#drawer-admin{
  display:block;width:100%;
  background:transparent;border:1px solid #1a3a22;
  border-radius:10px;padding:10px;
  color:#4a7a4e;font-size:11px;cursor:pointer;
  font-family:Georgia,serif;letter-spacing:2px;
  margin-top:4px;
  -webkit-tap-highlight-color:transparent
}

/* === MARKERS === */
.mk{
  width:44px;height:44px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;border:3px solid #fff;
  box-shadow:0 2px 10px rgba(0,0,0,.6);
  cursor:pointer;position:relative;
  touch-action:none;
  -webkit-tap-highlight-color:transparent
}
.mk-rescue{border-radius:10px}
.mk-done{opacity:.5}
.mk-pip{
  position:absolute;bottom:-4px;right:-4px;
  width:14px;height:14px;border-radius:50%;
  font-size:7px;display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(0,0,0,.3)
}
.mk-ring{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;border:2px solid;
  width:44px;height:44px;opacity:0;
  pointer-events:none;
  animation:ring 2.2s ease-out infinite
}
@keyframes ring{0%{width:44px;height:44px;opacity:.7}100%{width:88px;height:88px;opacity:0}}
.pdot{
  width:16px;height:16px;border-radius:50%;
  background:#fff;border:3px solid #22c55e;
  box-shadow:0 0 0 5px rgba(34,197,94,.2),0 0 14px rgba(34,197,94,.5)
}

/* === FULL-SCREEN PANEL === */
#panel{
  position:fixed;inset:0;z-index:30;
  background:#0a1a0d;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  display:none
}
#panel.on{display:block}
.pan-head{padding:max(14px,env(safe-area-inset-top,14px)) 16px 14px;border-bottom:2px solid #1a4a22}
.pan-back{
  background:transparent;border:none;color:#4a7a4e;
  font-size:13px;cursor:pointer;font-family:Georgia,serif;
  padding:0 0 10px;display:block;
  -webkit-tap-highlight-color:transparent
}
.pan-body{padding:16px}
.sbox{background:#0d1a10;border:1px solid #1a4a22;border-radius:10px;padding:14px;margin-bottom:14px;font-size:13px;line-height:1.7;color:#d4f0d4}
.tag2{font-size:9px;padding:2px 8px;border-radius:12px;display:inline-block;margin:2px}
.btn-p{
  display:block;width:100%;
  background:linear-gradient(135deg,#14532d,#166534);
  border:1px solid #22c55e;border-radius:12px;
  padding:14px 16px;color:#f0fdf4;
  font-family:Georgia,serif;font-size:14px;font-weight:bold;
  cursor:pointer;text-align:left;margin-bottom:10px;
  -webkit-tap-highlight-color:transparent
}
.btn-g{
  display:block;width:100%;
  background:transparent;border:1px solid #1a4a22;
  border-radius:12px;padding:12px 16px;color:#86efac;
  font-family:Georgia,serif;font-size:13px;
  cursor:pointer;text-align:left;margin-bottom:10px;
  -webkit-tap-highlight-color:transparent
}
.btn-r{
  display:block;width:100%;
  background:linear-gradient(135deg,#7c2d12,#9a3412);
  border:1px solid #ea580c;border-radius:12px;
  padding:14px;color:#fed7aa;
  font-family:Georgia,serif;font-size:14px;font-weight:bold;
  cursor:pointer;margin-bottom:10px;
  -webkit-tap-highlight-color:transparent
}
.finput{
  display:block;width:100%;
  background:#0d1a10;border:1px solid #1a4a22;
  border-radius:8px;padding:9px 11px;
  color:#f0fdf4;font-size:13px;
  font-family:Georgia,serif;outline:none;
  resize:vertical;-webkit-appearance:none;
  margin-bottom:12px
}
.flabel{font-size:11px;color:#86efac;letter-spacing:1px;font-weight:bold;display:block;margin-bottom:5px}
.prog{height:3px;background:#1a3a22;border-radius:2px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.yt{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;margin-bottom:14px}
.yt iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

/* === ADMIN === */
#admin{
  position:fixed;inset:0;z-index:40;
  background:#08080f;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  display:none
}
#admin.on{display:block}
.adm-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:max(14px,env(safe-area-inset-top,14px)) 16px 12px;
  border-bottom:1px solid #2a1a4a;
  background:#08080f
}
.adm-tabs{display:flex;gap:5px;padding:10px 14px;border-bottom:1px solid #1a1a3a;background:#08080f}
.atab{
  flex:1;background:transparent;border:1px solid #1a1a3a;
  border-radius:7px;padding:6px 2px;
  color:#6a4a9a;font-size:9px;cursor:pointer;
  font-family:Georgia,serif;
  -webkit-tap-highlight-color:transparent
}
.atab.on{background:#1a0a3a;border-color:#7c3aed;color:#c084fc}
.adm-body{padding:12px 14px}
.acard{
  background:#0d0d1a;border-radius:10px;
  padding:10px 12px;margin-bottom:8px;
  border-left:3px solid #2a2a5a
}
.adm-btn{
  display:block;width:100%;
  background:transparent;border:1px solid #2a1a4a;
  border-radius:10px;padding:10px;
  color:#6a4a9a;font-size:11px;cursor:pointer;
  font-family:Georgia,serif;margin-top:6px;
  -webkit-tap-highlight-color:transparent
}

/* === PROX TOAST === */
#toast{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(10,26,13,.97);
  border:1px solid #22c55e;border-radius:16px;
  padding:20px 22px;text-align:center;
  z-index:50;width:min(320px,90vw);
  box-shadow:0 8px 40px rgba(0,0,0,.8);
  display:none
}
#toast.on{display:block}

/* === LOGIN === */
#login{
  position:fixed;inset:0;z-index:45;
  background:#0a1a0d;
  display:none;
  align-items:center;justify-content:center;
  flex-direction:column;padding:30px
}
#login.on{display:flex}

/* scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1a4a22;border-radius:2px}
</style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
      <div>
        <div class="tb-title">UniSQ Toowoomba · Vet &amp; Animal Science</div>
        <div class="tb-heading">&#x1F998; WildWatch</div>
      </div>
      <div id="gps-badge" style="font-size:10px;color:#4a7a4e;text-align:right">
        <span id="gps-icon">&#x1F7E1;</span> <span id="gps-txt">Locating…</span>
      </div>
    </div>
    <div class="score-row">
      <div class="chip" style="border:1px solid rgba(239,68,68,.3)">
        <span class="chip-label">RESCUES</span>
        <span class="chip-val" id="s-rescue" style="color:#ef4444">0/4</span>
      </div>
      <div class="chip" style="border:1px solid rgba(14,165,233,.3)">
        <span class="chip-label">OBSERVATIONS</span>
        <span class="chip-val" id="s-obs" style="color:#0ea5e9">0/5</span>
      </div>
      <div class="chip" style="border:1px solid rgba(245,158,11,.3)">
        <span class="chip-label">SCORE</span>
        <span class="chip-val" id="s-score" style="color:#f59e0b">0</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="fbtn on" id="f-all"     onclick="setFilter('all')">&#x1F5FA; All</button>
      <button class="fbtn"    id="f-observe" onclick="setFilter('observe')">&#x1F441; Behaviour</button>
      <button class="fbtn"    id="f-rescue"  onclick="setFilter('rescue')">&#x1F6A8; Rescue</button>
      <button id="menu-btn"   onclick="openDrawer()">&#x2630;</button>
    </div>
  </div>
</div>

<!-- OVERLAY + DRAWER -->
<div id="overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div id="drawer-head">
    <span id="drawer-title">ALL LOCATIONS</span>
    <button id="drawer-close" onclick="closeDrawer()">&#x2715; Close</button>
  </div>
  <div id="drawer-body">
    <p style="color:#4a7a4e;font-size:12px;padding:10px 0">Loading locations…</p>
  </div>
</div>

<!-- PROXIMITY TOAST -->
<div id="toast">
  <div id="t-emoji" style="font-size:38px;margin-bottom:8px"></div>
  <div style="font-size:9px;letter-spacing:3px;color:#f59e0b;text-transform:uppercase;margin-bottom:4px">YOU'RE HERE</div>
  <div id="t-title" style="font-size:16px;font-weight:bold;color:#f0fdf4;margin-bottom:5px"></div>
  <div id="t-dist"  style="font-size:11px;color:#86efac;margin-bottom:14px"></div>
  <button class="btn-p" id="t-open" style="text-align:center;margin-bottom:8px">Open Activity</button>
  <button class="btn-g" onclick="closeToast()" style="text-align:center">Dismiss</button>
</div>

<!-- ADMIN LOGIN -->
<div id="login">
  <div style="font-size:32px;margin-bottom:10px">&#x1F512;</div>
  <div style="font-size:10px;letter-spacing:4px;color:#f59e0b;text-transform:uppercase;margin-bottom:6px">Lecturer Access</div>
  <div style="font-size:20px;font-weight:bold;color:#f0fdf4;margin-bottom:20px">Admin Panel</div>
  <input type="password" id="pin-input" placeholder="Enter PIN"
    style="width:100%;max-width:280px;background:#0d1a10;border:1px solid #1a4a22;border-radius:10px;padding:14px;color:#f0fdf4;font-size:20px;text-align:center;font-family:Georgia,serif;outline:none;letter-spacing:8px;margin-bottom:10px">
  <div id="pin-err" style="color:#ef4444;font-size:12px;height:16px;margin-bottom:8px"></div>
  <button class="btn-p" style="max-width:280px;text-align:center" onclick="tryLogin()">Unlock</button>
  <button class="btn-g" style="max-width:280px;text-align:center;margin-top:6px" onclick="hide('login')">&#x2190; Back</button>
  <div style="margin-top:16px;font-size:10px;color:#2a4a2a">Demo PIN: 1234</div>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
  <div class="adm-head">
    <div>
      <div style="font-size:9px;letter-spacing:3px;color:#a855f7;text-transform:uppercase">Lecturer Admin</div>
      <div style="font-size:17px;font-weight:bold;color:#f0fdf4">&#x1F6E0; Activity Manager</div>
    </div>
    <button class="btn-g" style="width:auto;padding:6px 12px;margin:0" onclick="hide('admin')">Exit</button>
  </div>
  <div class="adm-tabs">
    <button class="atab on" id="at-overview" onclick="adminTab('overview')">&#x1F4CA; Overview</button>
    <button class="atab"    id="at-stations" onclick="adminTab('stations')">&#x1F441; Stations</button>
    <button class="atab"    id="at-rescues"  onclick="adminTab('rescues')">&#x1F6A8; Rescues</button>
    <button class="atab"    id="at-drag"     onclick="adminTab('drag')">&#x270B; Drag</button>
    <button class="atab"    id="at-edit"     onclick="adminTab('edit')">&#x270F; Edit</button>
    <button class="atab"    id="at-add"      onclick="adminTab('add')">&#x2795; Add</button>
    <button class="atab"    id="at-bounds"   onclick="adminTab('bounds')">&#x1F5FA; Bounds</button>
    <button class="atab"    id="at-edit"     onclick="adminTab('edit')">&#x270F; Edit</button>
    <button class="atab"    id="at-add"      onclick="adminTab('add')">&#x2795; Add</button>
  </div>
  <div id="admin-body" class="adm-body"></div>
</div>

<!-- ACTIVITY PANEL -->
<div id="panel"></div>

function allLocs(){
  return OBS.concat(RES).concat(customLocs);
}
function getLoc(id){
  return allLocs().find(function(l){return l.id===id;});
}
function getCoords(loc){
  return coordOverrides[loc.id] || {lat:loc.lat,lng:loc.lng};
}
function isDone(loc){
  if(loc.type==='obs') return !!completed[loc.id];
  return !!(completed[loc.id] && completed[loc.id].rescued);
}

function show(id){ document.getElementById(id).classList.add('on'); }
function hide(id){ document.getElementById(id).classList.remove('on'); }
function qs(sel){ return document.querySelector(sel); }

function updateScores(){
  var rc = RES.filter(function(r){return completed[r.id]&&completed[r.id].rescued;}).length;
  var oc = OBS.filter(function(o){return completed[o.id];}).length + customLocs.filter(function(c){return completed[c.id];}).length;
  document.getElementById('s-rescue').textContent = rc+'/'+RES.length;
  document.getElementById('s-obs').textContent    = oc+'/'+(OBS.length+customLocs.length);
  document.getElementById('s-score').textContent  = score;
}

function haversine(lat1,lng1,lat2,lng2){
  var R=6371000, d2r=Math.PI/180;
  var dLat=(lat2-lat1)*d2r, dLng=(lng2-lng1)*d2r;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function initMap(){
  var el = document.getElementById('map');
  el.style.width  = window.innerWidth+'px';
  el.style.height = window.innerHeight+'px';

  map = L.map(el,{
    center:CAMP, zoom:18,
    zoomControl:false,
    attributionControl:true,
    tap:true, tapTolerance:20,
    touchZoom:true, doubleClickZoom:false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; OpenStreetMap', maxZoom:20
  }).addTo(map);

  L.control.zoom({position:'bottomright'}).addTo(map);

  drawBoundaries();

  // Place markers
  allLocs().forEach(function(loc){ addMarker(loc); });

  // Map click — close drawer
  map.on('click',function(e){ if(dragMode){ showMsg(e.latlng.lat.toFixed(6)+', '+e.latlng.lng.toFixed(6)); return; } closeDrawer(); });

  setTimeout(function(){ map.invalidateSize(true); },300);
}

// ============================================================
// MARKERS
// ============================================================
function mkHTML(loc){
  var done   = isDone(loc);
  var isObs  = loc.type==='obs';
  var colour = isObs ? loc.colour : (SEV[loc.severity]?SEV[loc.severity].border:'#888');
  var shape  = isObs ? '50%' : '10px';
  var pip    = isObs ? '&#x1F441;' : '&#x1F6A8;';
  var ring   = (!done && !dragMode)
    ? '<div class="mk-ring" style="border-color:'+colour+'"></div>' : '';
  return '<div class="mk'+(isObs?'':' mk-rescue')+(done?' mk-done':'')+'"'
    +' style="background:'+(done?'#0d2a10':'#0a0a12')
    +';border-color:'+(done?'#22c55e':colour)
    +';box-shadow:0 0 12px '+colour+'55'
    +';border-radius:'+shape+'">'
    +(done?'&#x2705;':loc.emoji)
    +'<div class="mk-pip" style="background:'+colour+'">'+pip+'</div>'
    +ring+'</div>';
}

var mkMap = {}; // id -> leaflet marker

function addMarker(loc){
  var c = getCoords(loc);
  var icon = L.divIcon({html:mkHTML(loc),className:'',iconSize:[44,44],iconAnchor:[22,22]});
  var m = L.marker([c.lat,c.lng],{icon:icon,draggable:false}).addTo(map);
  m.on('click',function(e){
    L.DomEvent.stopPropagation(e);
    if(dragMode){ showCoordToast(loc); return; }
    openLoc(loc.id);
  });
  m.on('dragend',function(e){
    var ll = e.target.getLatLng();
    coordOverrides[loc.id] = {lat:ll.lat, lng:ll.lng};
    loc.lat = ll.lat; loc.lng = ll.lng;
    refreshMarker(loc.id);
    showMsg((loc.type==='obs'?loc.title:loc.animal)+' moved');
  });
  mkMap[loc.id] = m;
}

function refreshMarker(id){
  var loc = getLoc(id); if(!loc||!mkMap[id]) return;
  var icon = L.divIcon({html:mkHTML(loc),className:'',iconSize:[44,44],iconAnchor:[22,22]});
  var c = getCoords(loc);
  mkMap[id].setIcon(icon);
  mkMap[id].setLatLng([c.lat, c.lng]);
}

// ============================================================
// GPS
// ============================================================
function initGPS(){
  if(!navigator.geolocation){
    setGPS('&#x1F534;','No GPS — using campus centre','#ef4444');
    playerPos={lat:CAMP[0],lng:CAMP[1]};
    placePlayer();
    return;
  }
  navigator.geolocation.watchPosition(
    function(pos){
      playerPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      setGPS('&#x1F7E2;','GPS active ±'+Math.round(pos.coords.accuracy)+'m','#22c55e');
      placePlayer();
      checkProx();
    },
    function(){
      setGPS('&#x1F7E1;','GPS denied','#f59e0b');
      if(!playerPos){ playerPos={lat:CAMP[0],lng:CAMP[1]}; placePlayer(); }
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:3000}
  );
}

function setGPS(icon,txt,col){
  document.getElementById('gps-icon').innerHTML = icon;
  document.getElementById('gps-txt').textContent  = txt;
  document.getElementById('gps-txt').style.color  = col;
}

function placePlayer(){
  var icon = L.divIcon({html:'<div class="pdot"></div>',className:'',iconSize:[16,16],iconAnchor:[8,8]});
  if(!playerMarker){
    playerMarker = L.marker([playerPos.lat,playerPos.lng],{icon:icon,zIndexOffset:1000}).addTo(map);
  } else {
    playerMarker.setLatLng([playerPos.lat,playerPos.lng]);
  }
}

function checkProx(){
  if(!playerPos) return;
  allLocs().forEach(function(loc){
    if(isDone(loc)) return;
    if(notified[loc.id]) return;
    if(filter!=='all' && loc.type!==filter) return;
    var c = getCoords(loc);
    var d = haversine(playerPos.lat,playerPos.lng,c.lat,c.lng);
    if(d<=PROX){
      notified[loc.id] = true;
      showProxToast(loc,Math.round(d));
    }
  });
}

// ============================================================
// FILTER
// ============================================================
function setFilter(f){
  filter = f;
  ['all','observe','rescue'].forEach(function(k){
    var b = document.getElementById('f-'+k);
    if(b) b.classList.toggle('on', k===f || (k==='all'&&f==='all') || (k==='observe'&&f==='obs') || (k==='rescue'&&f==='res'));
  });
  // Actually match correctly
  ['all','observe','rescue'].forEach(function(k){
    var b = document.getElementById('f-'+k);
    if(!b) return;
    var match = (k==='all'&&f==='all')||(k==='observe'&&f==='obs')||(k==='rescue'&&f==='res');
    b.classList.toggle('on', match);
  });
  allLocs().forEach(function(loc){
    var m = mkMap[loc.id]; if(!m) return;
    var show = f==='all' || loc.type===f;
    if(show) m.addTo(map); else map.removeLayer(m);
  });
  buildDrawer();
  openDrawer();
}

function openDrawer(){
  buildDrawer();
  show('overlay');
  show('drawer');
}
function closeDrawer(){
  hide('overlay');
  hide('drawer');
}

function buildDrawer(){
  var locs = allLocs().filter(function(l){
    return filter==='all' || l.type===filter;
  });
  document.getElementById('drawer-title').textContent =
    filter==='all'?'ALL LOCATIONS ('+locs.length+')':
    filter==='obs'?'BEHAVIOUR ('+locs.length+')':'RESCUE ('+locs.length+')';

  var body = document.getElementById('drawer-body');
  body.innerHTML = '';

  locs.forEach(function(loc){
    var done   = isDone(loc);
    var isObs  = loc.type==='obs';
    var colour = isObs ? loc.colour : (SEV[loc.severity]?SEV[loc.severity].border:'#888');
    var zc     = ZONE[loc.zone]||ZONE.CAMPUS;
    var name   = isObs ? loc.title : loc.animal;
    var sub    = isObs ? (loc.actLabel+' · '+loc.activity) : loc.location;
    var dist   = '';
    if(playerPos){
      var c = getCoords(loc);
      var d = Math.round(haversine(playerPos.lat,playerPos.lng,c.lat,c.lng));
      dist = d<1000?d+'m':(d/1000).toFixed(1)+'km';
    }

    var row = document.createElement('div');
    row.className = 'drow'+(done?' drow-done':'');
    row.style.borderLeftColor = done?'#22c55e':colour;
    row.innerHTML =
      '<span style="font-size:22px;flex-shrink:0">'+(done?'&#x2705;':loc.emoji)+'</span>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="drow-name" style="color:'+(done?'#4a7a4e':'#f0fdf4')+'">'+name+'</div>'+
        '<div class="drow-sub">'+sub+'</div>'+
        '<div>'+
          '<span class="dtag" style="background:'+zc.bg+';color:'+zc.text+'">'+zc.label+'</span>'+
          (dist?'<span class="dtag" style="background:#1a1a2a;color:#6b9e70">'+dist+'</span>':'')+
        '</div>'+
      '</div>'+
      '<div class="drow-arr">'+(done?'&#x2713;':'&#x203A;')+'</div>';

    (function(id){
      row.addEventListener('click',function(){
        closeDrawer();
        openLoc(id);
      });
    })(loc.id);

    body.appendChild(row);
  });

  // Admin button
  var ab = document.createElement('button');
  ab.className = 'drawer-admin';
  ab.style.cssText = 'display:block;width:100%;background:transparent;border:1px solid #1a3a22;border-radius:10px;padding:10px;color:#4a7a4e;font-size:11px;cursor:pointer;font-family:Georgia,serif;letter-spacing:2px;margin-top:8px;-webkit-tap-highlight-color:transparent';
  ab.textContent = '🔒 LECTURER ADMIN';
  ab.addEventListener('click',function(){ closeDrawer(); show('login'); });
  body.appendChild(ab);
}

function showMsg(txt){
  var el = document.getElementById('msg-bar');
  if(!el){
    el = document.createElement('div');
    el.id = 'msg-bar';
    el.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(10,26,13,.97);border:1px solid #22c55e;border-radius:10px;padding:10px 18px;font-size:12px;color:#86efac;z-index:60;pointer-events:none;max-width:90vw;text-align:center';
    document.body.appendChild(el);
  }
  el.textContent = txt;
  el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.style.display='none';},3000);
}

function openLoc(id){
  var loc = getLoc(id); if(!loc) return;
  var c = getCoords(loc);
  map.panTo([c.lat,c.lng],{animate:true,duration:.5});
  if(loc.type==='obs') showObsIntro(loc);
  else{
    if(!completed[id]) completed[id]={found:true,rescued:false};
    else completed[id].found=true;
    showEncounter(loc);
  }
}

function showObsRecord(id){
  var loc = getLoc(id); if(!loc) return;
  var ans = answers[id]||{};
  var req = loc.fields.filter(function(f){return f.id!=='notes';});
  var filled = req.filter(function(f){return ans[f.id]&&ans[f.id].trim();}).length;
  var pct = req.length ? Math.round(filled/req.length*100) : 0;
  var canSave = filled>=req.length;
  var time = new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});

  var fieldsHTML = loc.fields.map(function(f){
    var val = ans[f.id]||'';
    var inp = '';
    if(f.type==='select'){
      var opts = (f.opts||[]).map(function(o){
        return '<option value="'+o+'"'+(val===o?' selected':'')+'>'+o+'</option>';
      }).join('');
      inp = '<select class="finput" onchange="setAns(\''+id+'\',\''+f.id+'\',this.value)"><option value="">— Select —</option>'+opts+'</select>';
    } else if(f.type==='area'){
      inp = '<textarea class="finput" rows="3" placeholder="'+(f.ph||'')+'" oninput="setAns(\''+id+'\',\''+f.id+'\',this.value)">'+val+'</textarea>';
    } else {
      inp = '<input class="finput" type="text" placeholder="'+(f.ph||'')+'" value="'+val+'" oninput="setAns(\''+id+'\',\''+f.id+'\',this.value)">';
    }
    return '<label class="flabel">'+f.label+'</label>'+inp;
  }).join('');

  showPanel(
    '<div class="pan-head" style="border-bottom-color:'+loc.colour+'44;position:sticky;top:0;background:#0a1a0d;z-index:5">'+
      '<button class="pan-back" onclick="showObsVideo(\''+id+'\')">&#x2190; Back to video</button>'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div>'+
          '<div style="font-size:13px;font-weight:bold;color:#f0fdf4">'+loc.emoji+' '+loc.title+'</div>'+
          '<div style="font-size:10px;color:'+loc.colour+'">Worksheet '+loc.activity+'</div>'+
        '</div>'+
        '<div style="font-size:10px;color:#4a7a4e">'+filled+'/'+req.length+' fields</div>'+
      '</div>'+
      '<div class="prog"><div class="prog-fill" id="prog-'+id+'" style="width:'+pct+'%;background:'+loc.colour+'"></div></div>'+
    '</div>'+
    '<div class="pan-body">'+
      '<div style="background:#0d1a10;border:1px solid '+loc.colour+'33;border-radius:10px;padding:10px;margin-bottom:12px">'+
        '<div style="font-size:10px;color:'+loc.colour+';letter-spacing:2px;margin-bottom:4px">AUTO-LOGGED</div>'+
        '<div style="font-size:12px;color:#86efac">&#x1F4CD; '+loc.title+' &middot; &#x1F550; '+time+'</div>'+
      '</div>'+
      '<div id="obs-fields-'+id+'">'+fieldsHTML+'</div>'+
      '<button id="save-btn-'+id+'" class="btn-p" style="'+(canSave?'':'background:#1a1a1a;border-color:#333;color:#4a4a4a')+';text-align:center" onclick="trySubmitObs(\''+id+'\')">'+(canSave?'&#x2705; Submit &amp; Unlock Next Location':'Complete all fields to submit ('+(req.length-filled)+' remaining)')+'</button>'+
      '<div style="font-size:11px;color:#4a7a4e;text-align:center;margin-top:10px;font-style:italic">Transfer these to Activity '+loc.activity+' in your paper worksheet.</div>'+
    '</div>'
  );
}

function setAns(id,field,val){
  if(!answers[id]) answers[id]={};
  answers[id][field]=val;
  // Update progress bar and button live
  var loc = getLoc(id); if(!loc) return;
  var ans = answers[id];
  var req = loc.fields.filter(function(f){return f.id!=='notes';});
  var filled = req.filter(function(f){return ans[f.id]&&ans[f.id].trim();}).length;
  var pct = req.length ? Math.round(filled/req.length*100) : 0;
  var canSave = filled>=req.length;
  var bar = document.getElementById('prog-'+id);
  var btn = document.getElementById('save-btn-'+id);
  if(bar) bar.style.width=pct+'%';
  if(btn){
    btn.textContent = canSave?'✅ Submit & Unlock Next Location':'Complete all fields to submit ('+(req.length-filled)+' remaining)';
    btn.style.cssText = canSave?'':'background:#1a1a1a;border-color:#333;color:#4a4a4a;display:block;width:100%;border-radius:12px;padding:14px;font-family:Georgia,serif;font-size:14px;font-weight:bold;cursor:pointer;text-align:center;margin-bottom:10px';
    if(canSave) btn.onclick = function(){ trySubmitObs(id); };
    else btn.onclick = null;
  }
}

function trySubmitObs(id){
  var loc = getLoc(id); if(!loc) return;
  var ans = answers[id]||{};
  var req = loc.fields.filter(function(f){return f.id!=='notes';});
  var filled = req.filter(function(f){return ans[f.id]&&ans[f.id].trim();}).length;
  if(filled<req.length){ showMsg('Please complete all required fields.'); return; }
  completed[id] = true;
  score += 20;
  updateScores();
  refreshMarker(id);
  showObsComplete(loc);
}

function showObsComplete(loc){
  var ans = answers[loc.id]||{};
  var rows = loc.fields.slice(0,5).filter(function(f){return ans[f.id];}).map(function(f,i){
    return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:'+(i<4?'1px solid #1a4a2244':'none')+'">'+
      '<span style="font-size:10px;color:#4a7a4e;flex:0 0 42%">'+f.label.slice(0,24)+'</span>'+
      '<span style="font-size:10px;color:#d4f0d4;text-align:right;flex:0 0 56%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(ans[f.id]||'').slice(0,30)+'</span>'+
    '</div>';
  }).join('');

  showPanel(
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px 20px;text-align:center">'+
      '<div style="font-size:52px;margin-bottom:8px">&#x1F52D;</div>'+
      '<div style="font-size:10px;letter-spacing:4px;color:'+loc.colour+';text-transform:uppercase;margin-bottom:6px">Observation Logged</div>'+
      '<div style="font-size:20px;font-weight:bold;color:#f0fdf4;margin-bottom:4px">'+loc.title+'</div>'+
      '<div style="font-size:13px;color:#86efac;margin-bottom:18px">'+loc.unlockMsg+'</div>'+
      '<div style="background:#0d1a10;border:1px solid '+loc.colour+'44;border-radius:12px;padding:14px;margin-bottom:14px;width:100%;text-align:left">'+
        '<div style="font-size:10px;color:#4a7a4e;letter-spacing:2px;margin-bottom:8px">FIELD LOG</div>'+rows+
      '</div>'+
      '<div style="background:'+loc.colour+'22;border:1px solid '+loc.colour+'44;border-radius:10px;padding:10px;margin-bottom:14px;width:100%;font-size:12px;color:'+loc.colour+';font-style:italic">'+
        '&#x1F4CB; Transfer these to Activity '+loc.activity+' in your paper worksheet.'+
      '</div>'+
      '<div style="font-size:20px;font-weight:bold;color:#f59e0b;margin-bottom:6px">+20 pts &middot; Total: '+score+'</div>'+
      '<button class="btn-p" style="text-align:center;max-width:240px" onclick="closePanel()">&#x1F5FA; Back to Map</button>'+
    '</div>'

// ============================================================
// QUIZ
// ============================================================
function startQuiz(id){
  quizStep=0; quizSelected=null;
  showQuiz(id);
}

function showQuiz(id){
  var loc = getLoc(id); if(!loc) return;
  var q = loc.quiz[quizStep];
  var prog = loc.quiz.map(function(_,i){
    return '<div style="flex:1;height:4px;border-radius:2px;background:'+(i<quizStep?'#22c55e':i===quizStep?'#60a5fa':'#1a3a3a')+'"></div>';
  }).join('');

  var opts = q.opts.map(function(opt,i){
    var bg='#0d1a10',border='#1a4a22',col='#d4f0d4';
    if(quizSelected!==null){
      if(i===q.ans){bg='#14532d';border='#22c55e';col='#f0fdf4';}
      else if(i===quizSelected&&i!==q.ans){bg='#450a0a';border='#ef4444';col='#fca5a5';}
    }
    var tick = (quizSelected!==null && i===q.ans)?' &#x2713;':'';
    var cross= (quizSelected!==null && i===quizSelected && i!==q.ans)?' &#x2717;':'';
    return '<button onclick="answerQuiz(\''+id+'\','+i+')" style="display:block;width:100%;background:'+bg+';border:1px solid '+border+';border-radius:10px;padding:12px 14px;color:'+col+';font-family:Georgia,serif;font-size:13px;cursor:'+(quizSelected===null?'pointer':'default')+';text-align:left;margin-bottom:8px;-webkit-tap-highlight-color:transparent">'+
      '<span style="color:#4a7a4e;margin-right:8px">'+String.fromCharCode(65+i)+'.</span>'+opt+tick+cross+
    '</button>';
  }).join('');

  var expl = quizSelected!==null
    ? '<div style="background:#0d1f0a;border:1px solid #22c55e44;border-radius:10px;padding:12px;margin-bottom:12px">'+
        '<div style="font-size:10px;letter-spacing:2px;color:#4aa44a;margin-bottom:5px">&#x1F4A1; EXPLANATION</div>'+
        '<div style="font-size:13px;color:#d4f0d4;line-height:1.6">'+q.expl+'</div>'+
      '</div>'+
      '<button class="btn-p" style="text-align:center" onclick="'+(quizStep+1<loc.quiz.length?'nextQuiz(\''+id+'\')':'showTreatment(\''+id+'\')')+'">'+
        (quizStep+1<loc.quiz.length?'Next Question &#x2192;':'Proceed to Treatment &#x2192;')+
      '</button>'
    : '';

  showPanel(
    '<div class="pan-head" style="border-bottom-color:#1a4a44;background:#0a1a1a">'+
      '<div style="font-size:10px;letter-spacing:3px;color:#4aa4a0;text-transform:uppercase;margin-bottom:6px">Q'+(quizStep+1)+' of '+loc.quiz.length+'</div>'+
      '<div style="display:flex;gap:5px">'+prog+'</div>'+
    '</div>'+
    '<div class="pan-body">'+
      '<div style="font-size:10px;color:#6b9e70;margin-bottom:8px">'+loc.emoji+' '+loc.animal+'</div>'+
      '<div class="sbox" style="font-size:14px;font-weight:bold;color:#f0fdf4;line-height:1.6;margin-bottom:16px">'+q.q+'</div>'+
      opts+expl+
    '</div>'
  );
}

function answerQuiz(id,i){
  if(quizSelected!==null) return;
  quizSelected=i;
  var loc=getLoc(id);
  if(loc && i===loc.quiz[quizStep].ans) score+=10;
  updateScores();
  showQuiz(id);
}

function nextQuiz(id){
  quizStep++;
  quizSelected=null;
  showQuiz(id);
}

// ============================================================
// TREATMENT
// ============================================================
function showTreatment(id){
  treatSel=[];
  treatDone=false;
  renderTreatment(id);
}

function renderTreatment(id){
  var loc=getLoc(id); if(!loc) return;
  var items = loc.treats.map(function(t,i){
    var bg='#0d1a10',border='#1a4a22',col='#d4f0d4';
    var sel=treatSel.indexOf(i)>-1;
    if(!treatDone){ if(sel){bg='#0d2a40';border='#3b82f6';col='#f0fdf4';} }
    else{
      if(t.ok&&sel){bg='#14532d';border='#22c55e';col='#f0fdf4';}
      else if(t.ok&&!sel){bg='#1a2a14';border='#22c55e88';col='#86efac';}
      else if(!t.ok&&sel){bg='#450a0a';border='#ef4444';col='#fca5a5';}
    }
    var badge='';
    if(treatDone){
      if(t.ok) badge='<span style="color:#22c55e;font-size:11px">&#x2713; Correct</span>';
      else if(sel) badge='<span style="color:#ef4444;font-size:11px">&#x2717; Wrong</span>';
      else badge='<span style="color:#22c55e88;font-size:10px">Should include</span>';
    } else if(sel){
      badge='<span style="color:#60a5fa">&#x2713;</span>';
    }
    return '<button onclick="toggleTreat(\''+id+'\','+i+')" style="display:flex;justify-content:space-between;align-items:center;width:100%;background:'+bg+';border:1px solid '+border+';border-radius:10px;padding:12px 14px;color:'+col+';font-family:Georgia,serif;font-size:13px;cursor:'+(treatDone?'default':'pointer')+';text-align:left;margin-bottom:8px;-webkit-tap-highlight-color:transparent">'+
      '<span>'+t.label+'</span>'+badge+
    '</button>';
  }).join('');

  var action = treatDone
    ? '<button class="btn-p" style="text-align:center" onclick="completeRescue(\''+id+'\')">&#x1F3C6; Complete Rescue! &#x2192;</button>'
    : '<button class="btn-r" style="text-align:center" onclick="submitTreatment(\''+id+'\')">Submit Treatment Plan</button>';

  showPanel(
    '<div class="pan-head" style="background:#1a0a00;border-bottom-color:#ea580c44">'+
      '<div style="font-size:10px;letter-spacing:3px;color:#fb923c;text-transform:uppercase;margin-bottom:4px">Treatment Plan</div>'+
      '<div style="font-size:17px;font-weight:bold;color:#f0fdf4">Select all correct actions</div>'+
      '<div style="font-size:11px;color:#9a6a44">Incorrect choices affect your score</div>'+
    '</div>'+
    '<div class="pan-body">'+
      '<div style="font-size:11px;color:#6b9e70;margin-bottom:12px">'+loc.emoji+' '+loc.animal+'</div>'+
      items+action+
    '</div>'
  );
}

function toggleTreat(id,i){
  if(treatDone) return;
  var idx=treatSel.indexOf(i);
  if(idx>-1) treatSel.splice(idx,1); else treatSel.push(i);
  renderTreatment(id);
}

function submitTreatment(id){
  treatDone=true;
  var loc=getLoc(id);
  if(loc){
    var pts=loc.treats.filter(function(t,i){return t.ok===(treatSel.indexOf(i)>-1);}).length;
    score+=pts*5;
    updateScores();
  }
  renderTreatment(id);
}

function completeRescue(id){
  completed[id]={found:true,rescued:true};
  score+=25;
  updateScores();
  refreshMarker(id);
  var loc=getLoc(id);
  if(!loc) return;
  showPanel(
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px 20px;text-align:center">'+
      '<div style="font-size:52px;margin-bottom:8px">&#x1F3C6;</div>'+
      '<div style="font-size:10px;letter-spacing:4px;color:#f59e0b;text-transform:uppercase;margin-bottom:6px">Rescue Complete</div>'+
      '<div style="font-size:20px;font-weight:bold;color:#f0fdf4;margin-bottom:4px">'+loc.animal+'</div>'+
      '<div style="font-size:13px;color:#86efac;margin-bottom:18px">Successfully assessed and referred</div>'+
      '<div style="background:#0d2a14;border:1px solid #22c55e44;border-radius:12px;padding:14px;margin-bottom:14px;width:100%;text-align:left">'+
        '<div style="font-size:10px;color:#4a7a4e;letter-spacing:2px;margin-bottom:8px">FIELD LOG</div>'+
        ['Species:'+loc.animal,'Location:'+loc.location,'Referral:'+loc.referral,'Status:Referred ✓'].map(function(s,i){
          var p=s.split(':');
          return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:'+(i<3?'1px solid #1a4a2244':'none')+'">'+
            '<span style="font-size:11px;color:#4a7a4e">'+p[0]+'</span>'+
            '<span style="font-size:11px;color:#d4f0d4;text-align:right;max-width:60%">'+p.slice(1).join(':')+'</span>'+
          '</div>';
        }).join('')+
      '</div>'+
      '<div style="font-size:20px;font-weight:bold;color:#f59e0b;margin-bottom:6px">+25 pts &middot; Total: '+score+'</div>'+
      '<button class="btn-p" style="text-align:center;max-width:240px" onclick="closePanel()">&#x1F5FA; Back to Map</button>'+
    '</div>'
  );
}

function tryLogin(){
  var pin = document.getElementById('pin-input').value;
  if(pin==='1234'){

    var hd=document.createElement('div');hd.style.cssText='font-size:10px;letter-spacing:2px;color:'+color+';margin-bottom:8px;font-weight:bold';hd.textContent=title.toUpperCase()+' BOUNDARY';body.appendChild(hd);

    info.textContent='SW = south-west corner, NE = north-east corner. Tip: enable Drag mode then tap the map to read coordinates.';body.appendChild(info);
    var grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px';
    [{id:key+'-sw-lat',label:'SW Latitude',val:BOUNDS[key].sw[0]},{id:key+'-sw-lng',label:'SW Longitude',val:BOUNDS[key].sw[1]},
     {id:key+'-ne-lat',label:'NE Latitude',val:BOUNDS[key].ne[0]},{id:key+'-ne-lng',label:'NE Longitude',val:BOUNDS[key].ne[1]}].forEach(function(f){

      wrap.appendChild(lbl);wrap.appendChild(inp);grid.appendChild(wrap);
    });body.appendChild(grid);
    var pv=document.createElement('button');pv.className='adm-btn';pv.style.cssText='border-color:'+color+';color:'+color+';margin-bottom:6px';pv.textContent='\u25b6 Preview on Map';
    (function(k){pv.addEventListener('click',function(){previewBoundary(k);});})(key);body.appendChild(pv);
    var sv=document.createElement('button');sv.className='adm-btn';sv.style.cssText='border-color:#22c55e;color:#86efac;margin-bottom:16px';sv.textContent='\u2705 Save & Redraw';
    (function(k){sv.addEventListener('click',function(){saveBoundary(k);});})(key);body.appendChild(sv);
    var dv=document.createElement('div');dv.style.cssText='height:1px;background:#1a1a3a;margin-bottom:16px';body.appendChild(dv);
  }
  addSection('Ju Raku En Japanese Garden','garden','#22c55e');
  addSection('UniSQ Toowoomba Campus','campus','#3b82f6');
  var rst=document.createElement('button');rst.className='adm-btn';rst.style.cssText='border-color:#ef444444;color:#fca5a5;margin-top:4px';rst.textContent='\u21ba Reset Both to Defaults';
  rst.addEventListener('click',function(){
    if(!confirm('Reset both boundaries to defaults?'))return;
    BOUNDS.garden.sw=[-27.6025,151.9318];BOUNDS.garden.ne=[-27.5998,151.9355];
    BOUNDS.campus.sw=[-27.6075,151.9300];BOUNDS.campus.ne=[-27.6025,151.9375];
    drawBoundaries();showBoundsEditor();showMsg('Boundaries reset');
  });body.appendChild(rst);
}
function readBoundaryInputs(key){
  var g=function(id){var el=document.getElementById(id);return el?parseFloat(el.value):NaN;};
  var a=g(key+'-sw-lat'),b=g(key+'-sw-lng'),c=g(key+'-ne-lat'),d=g(key+'-ne-lng');
  if(isNaN(a)||isNaN(b)||isNaN(c)||isNaN(d)){showMsg('Enter valid numbers for all four fields.');return null;}
  return {sw:[a,b],ne:[c,d]};
}
function previewBoundary(key){
  var co=readBoundaryInputs(key);if(!co)return;
  if(boundaryLayers[key]&&map.hasLayer(boundaryLayers[key]))map.removeLayer(boundaryLayers[key]);
  boundaryLayers[key]=L.polygon(boundsToCorners({sw:co.sw,ne:co.ne}),{color:BOUNDS[key].color,weight:2.5,opacity:.85,fillColor:BOUNDS[key].color,fillOpacity:.12,dashArray:'5,4'}).addTo(map).bindPopup(BOUNDS[key].name);
  map.fitBounds([co.sw,co.ne],{padding:[40,40]});
  hide('admin');
  showMsg('Preview — tap Save & Redraw in Bounds tab to keep');
}
function saveBoundary(key){
  var co=readBoundaryInputs(key);if(!co)return;
  BOUNDS[key].sw=co.sw;BOUNDS[key].ne=co.ne;
  drawBoundaries();map.fitBounds([co.sw,co.ne],{padding:[60,60]});
  showMsg(BOUNDS[key].name+' boundary saved!');
}

function toggleDrag(){
  dragMode = !dragMode;
  allLocs().forEach(function(loc){
    var m=mkMap[loc.id]; if(!m) return;
    if(dragMode){
      m.dragging.enable();
    } else {
      m.dragging.disable();
      var c=getCoords(loc); m.setLatLng([c.lat,c.lng]);
    }
    refreshMarker(loc.id);
  });
  showMsg(dragMode?'Drag mode ON — drag markers to new positions':'Drag mode OFF — positions saved');
  adminTab('overview');
}

function resetAll(){
  if(confirm('Reset all student progress?')){
    completed={}; answers={}; score=0;
    allLocs().forEach(function(loc){ refreshMarker(loc.id); });
    updateScores();
    showMsg('Progress reset');
  }
}

function exportCoords(){
  var lines = allLocs().map(function(loc){
    var c=getCoords(loc);
    return '// '+(loc.type==='obs'?loc.title:loc.animal)+'\n{ id:"'+loc.id+'", lat:'+c.lat.toFixed(6)+', lng:'+c.lng.toFixed(6)+' }';
  }).join(',\n');
  var ta=document.createElement('textarea');
  ta.value=lines;
  ta.style.cssText='position:fixed;top:10px;left:10px;right:10px;height:200px;z-index:999;background:#0d0d1a;color:#c084fc;border:1px solid #7c3aed;border-radius:8px;padding:10px;font-size:11px;font-family:monospace';
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand('copy');}catch(e){}
  var cb=document.createElement('button');
  cb.textContent='Close (copied to clipboard)';
  cb.style.cssText='position:fixed;top:220px;left:10px;z-index:999;background:#1a0a3a;border:1px solid #7c3aed;color:#c084fc;padding:8px 14px;border-radius:8px;font-family:Georgia,serif;font-size:12px;cursor:pointer';
  cb.onclick=function(){ta.remove();cb.remove();};
  document.body.appendChild(cb);
}

function resizeMap(){
  var el=document.getElementById('map');
  if(!el) return;
  el.style.width=window.innerWidth+'px';
  el.style.height=window.innerHeight+'px';
  if(typeof map!=='undefined'&&map) map.invalidateSize(true);
}

window.addEventListener('resize',function(){setTimeout(resizeMap,100);});
window.addEventListener('orientationchange',function(){setTimeout(resizeMap,350);});

window.onload=function(){
  resizeMap();
  initMap();
  initGPS();
  updateScores();
  setTimeout(resizeMap,200);
  setTimeout(function(){map.invalidateSize(true);},500);
};

      var okb = document.createElement('button');
      okb.id = 'et-ok-' + ti;
      okb.style.cssText = 'flex-shrink:0;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;' +
        'background:' + (t.ok ? '#14532d' : '#450a0a') + ';' +
        'border:1px solid ' + (t.ok ? '#22c55e' : '#ef4444') + ';' +
        'color:' + (t.ok ? '#86efac' : '#fca5a5');
      okb.textContent = t.ok ? '\u2713' : '\u2717';
      (function(ti2) {
        okb.addEventListener('click', function() { toggleTreatOk(loc.id, ti2); });
      })(ti);
      var li2 = document.createElement('input');
      li2.id = 'et-lbl-' + ti; li2.className = 'finput'; li2.type = 'text';
      li2.value = (t.label || '').replace(/&#x[0-9A-Fa-f]+;/g, '').replace(/&[a-z0-9]+;/gi, '').trim();
      li2.style.cssText = 'flex:1;margin-bottom:0';
      var db = document.createElement('button');
      db.style.cssText = 'background:transparent;border:none;color:#ef444488;font-size:18px;cursor:pointer;flex-shrink:0';
      db.textContent = '\u00d7';
      (function(ti2) {
        db.addEventListener('click', function() { removeTreat(loc.id, ti2); });
      })(ti);
      row.appendChild(okb); row.appendChild(li2); row.appendChild(db);
      tSec.appendChild(row);
    });
    var atb = document.createElement('button');
    atb.className = 'adm-btn'; atb.textContent = '+ Add Treatment Action';
    atb.addEventListener('click', function() { addTreat(loc.id); });
    tSec.appendChild(atb); body.appendChild(tSec);
  }

  // Divider + Save
  var div = document.createElement('div');
  div.style.cssText = 'height:1px;background:#1a1a3a;margin:14px 0';
  body.appendChild(div);
  var sv = document.createElement('button');
  sv.className = 'btn-p'; sv.style.textAlign = 'center';
  sv.textContent = '\u2705 Save Changes';
  sv.addEventListener('click', function() { saveEdit(loc.id); });
  body.appendChild(sv);
  // Delete button for custom stations only
  if (customLocs.find(function(c) { return c.id === loc.id; })) {
    var dl = document.createElement('button');
    dl.className = 'adm-btn';
    dl.style.cssText = 'border-color:#ef444444;color:#fca5a5;margin-top:6px';
    dl.textContent = 'Delete This Station';
    dl.addEventListener('click', function() { deleteLoc(loc.id); });
    body.appendChild(dl);
  }
}

function previewYT() {
  var el = document.getElementById('ef-ytId'); if (!el) return;
  var ytId = el.value.trim(); if (!ytId) return;
  var fr = document.getElementById('yt-prev');
  if (fr) {
    fr.src = 'https://www.youtube.com/embed/' + ytId + '?rel=0&modestbranding=1';
  } else {
    var yw = document.createElement('div');
    yw.style.cssText = 'position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;margin-bottom:14px';
    var yf = document.createElement('iframe');
    yf.id = 'yt-prev';
    yf.src = 'https://www.youtube.com/embed/' + ytId + '?rel=0&modestbranding=1';
    yf.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none';
    yf.allowFullscreen = true;
    yw.appendChild(yf);
    // Insert after the hint div
    var inpEl = document.getElementById('ef-ytId');
    if (inpEl && inpEl.parentNode && inpEl.parentNode.parentNode) {
      inpEl.parentNode.parentNode.insertBefore(yw, inpEl.parentNode.nextSibling);
    }
  }
}

function setQuizCorrect(locId, qi, oi) {
  var loc = getLoc(locId); if (!loc) return;
  loc.quiz[qi].ans = oi;
  showEditForm(loc);
}

function addQuizQ(locId) {
  var loc = getLoc(locId); if (!loc) return;
  saveEditState(loc);
  loc.quiz.push({ q: '', opts: ['', '', '', ''], ans: 0, expl: '' });
  showEditForm(loc);
}

function addTreat(locId) {
  var loc = getLoc(locId); if (!loc) return;
  saveEditState(loc);
  loc.treats.push({ label: '', ok: true });
  showEditForm(loc);
}

function removeTreat(locId, ti) {
  var loc = getLoc(locId); if (!loc) return;
  saveEditState(loc);
  loc.treats.splice(ti, 1);
  showEditForm(loc);
}

function toggleTreatOk(locId, ti) {
  var loc = getLoc(locId); if (!loc) return;
  loc.treats[ti].ok = !loc.treats[ti].ok;
  var b = document.getElementById('et-ok-' + ti); if (!b) return;
  var ok = loc.treats[ti].ok;
  b.style.background = ok ? '#14532d' : '#450a0a';
  b.style.borderColor = ok ? '#22c55e' : '#ef4444';
  b.style.color = ok ? '#86efac' : '#fca5a5';
  b.textContent = ok ? '\u2713' : '\u2717';
}

function saveEditState(loc) {
  var isObs = loc.type === 'obs';
  var g = function(id) { var el = document.getElementById(id); return el ? el.value : null; };
  var t = g('ef-title');
  if (t !== null) { if (isObs) loc.title = t; else loc.animal = t; }
  var lo = g('ef-location');
  if (lo !== null) { if (isObs) loc.title = lo; else loc.location = lo; }
  var yt = g('ef-ytId'); if (yt !== null) loc.ytId = yt.trim();
  var d = g('ef-desc'); if (d !== null) loc.desc = d;
  if (isObs) {
    var a = g('ef-activity'); if (a !== null) loc.activity = a;
    var al = g('ef-actLabel'); if (al !== null) loc.actLabel = al;
    var bf = g('ef-bFocus');
    if (bf !== null) loc.bFocus = bf.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
  } else {
    var sev = g('ef-severity'); if (sev !== null) loc.severity = sev;
    var fn = g('ef-fieldNotes'); if (fn !== null) loc.notes = fn;
    var rf = g('ef-referral'); if (rf !== null) loc.referral = rf;
    (loc.quiz || []).forEach(function(q, qi) {
      var qt = g('eq-q-' + qi); if (qt !== null) q.q = qt;
      var qe = g('eq-expl-' + qi); if (qe !== null) q.expl = qe;
      (q.opts || []).forEach(function(_, oi) {
        var ov = g('eq-opt-' + qi + '-' + oi); if (ov !== null) q.opts[oi] = ov;
      });
    });
    (loc.treats || []).forEach(function(t, ti) {
      var lb = g('et-lbl-' + ti); if (lb !== null) t.label = lb;
    });
  }
}

function saveEdit(locId) {
  var loc = getLoc(locId); if (!loc) return;
  saveEditState(loc);
  refreshMarker(locId);
  buildDrawer();
  showMsg((loc.type === 'obs' ? loc.title : loc.animal) + ' saved!');
  adminTab('edit');
}

function deleteLoc(id) {
  if (!confirm('Delete this station?')) return;
  customLocs = customLocs.filter(function(c) { return c.id !== id; });
  if (mkMap[id]) { map.removeLayer(mkMap[id]); delete mkMap[id]; }
  buildDrawer();
  showMsg('Station deleted');
  adminTab('edit');
}

function showAddForm() {
  var body = document.getElementById('admin-body');
  body.innerHTML = '';
  var hd = document.createElement('div');
  hd.style.cssText = 'font-size:10px;letter-spacing:2px;color:#22c55e;margin-bottom:12px';
  hd.textContent = 'ADD NEW OBSERVATION STATION'; body.appendChild(hd);
  var note = document.createElement('div');
  note.style.cssText = 'font-size:12px;color:#4a7a4e;margin-bottom:14px';
  note.textContent = 'New stations are added as observation activities.'; body.appendChild(note);

  body.appendChild(mkRow('STATION TITLE', mkInp('new-title', '', 'e.g. Library Pond')));
  body.appendChild(mkRow('YOUTUBE VIDEO ID', mkInp('new-ytId', '', 'e.g. dQw4w9WgXcQ')));
  body.appendChild(mkRow('DESCRIPTION', mkArea('new-desc', '', 'What students will observe here', 3)));

  var r = document.createElement('div'); r.style.cssText = 'display:flex;gap:8px;margin-bottom:12px';
  var la = document.createElement('div'); la.style.flex = '1';
  var lal = document.createElement('label');
  lal.style.cssText = 'font-size:10px;color:#86efac;letter-spacing:1px;font-weight:bold;display:block;margin-bottom:4px';
  lal.textContent = 'WORKSHEET CODE';
  var lai = mkInp('new-activity', '', 'e.g. B3'); lai.style.marginBottom = '0';
  la.appendChild(lal); la.appendChild(lai);
  var lb = document.createElement('div'); lb.style.flex = '1';
  var lbl2 = document.createElement('label');
  lbl2.style.cssText = 'font-size:10px;color:#86efac;letter-spacing:1px;font-weight:bold;display:block;margin-bottom:4px';
  lbl2.textContent = 'ZONE';
  var sl = mkSel('new-zone', ['CAMPUS', 'GARDEN'], 'CAMPUS'); sl.style.marginBottom = '0';
  lb.appendChild(lbl2); lb.appendChild(sl);
  r.appendChild(la); r.appendChild(lb); body.appendChild(r);

  body.appendChild(mkRow('BEHAVIOUR TAGS (one per line)',
    mkArea('new-bFocus', '', 'Foraging\nResting\nAlert', 4)));

  var info = document.createElement('div');
  info.style.cssText = 'background:#0d1a10;border:1px solid #1a4a22;border-radius:8px;padding:10px;margin-bottom:14px;font-size:11px;color:#6b9e70';
  info.textContent = 'Station placed at campus centre. Use Drag mode in Overview to reposition it.';
  body.appendChild(info);

  var sb = document.createElement('button');
  sb.className = 'btn-p'; sb.style.textAlign = 'center';
  sb.textContent = '+ Add Station to Map';
  sb.addEventListener('click', function() { saveNewStation(); });
  body.appendChild(sb);
}

function saveNewStation() {
  var g = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; };
  var title = g('new-title');
  if (!title) { showMsg('Please enter a station title.'); return; }
  var id = 'custom_' + Date.now();
  var ns = {
    id: id, lat: CAMP[0], lng: CAMP[1], type: 'obs',
    title: title, zone: g('new-zone') || 'CAMPUS',
    emoji: '\u{1F50D}', colour: '#a855f7',
    activity: g('new-activity') || 'B1', actLabel: 'Observation',
    ytId: g('new-ytId'), desc: g('new-desc'),
    bFocus: g('new-bFocus').split('\n').map(function(s) { return s.trim(); }).filter(Boolean),
    fields: [{ id: 'notes', label: 'Field notes', type: 'area', ph: 'Record your observations here' }],
    unlockMsg: 'Observation logged! Transfer to your worksheet.'
  };
  customLocs.push(ns);
  addMarker(ns);
  buildDrawer();
  updateScores();
  showMsg(title + ' added! Use Drag mode to position it on the map.');
  adminTab('edit');
}

</script>
</body>
</html>
