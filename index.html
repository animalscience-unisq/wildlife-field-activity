<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WildWatch">
<meta name="theme-color" content="#080f0a">
<title>UniSQ Wildlife Field Activity</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;font-family:Georgia,serif;background:#080f0a;color:#e8f0e0;}
#map{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
.leaflet-container{background:#0d1f10!important;}
.leaflet-control-zoom{margin-bottom:90px!important;margin-right:12px!important;}
.map-tiles{filter:brightness(.82) saturate(.85);}
.ldt{background:rgba(8,15,10,.96)!important;border:1px solid #1a4a22!important;border-radius:8px!important;padding:6px 10px!important;color:#f0fdf4!important;font-family:Georgia,serif!important;}
.ldt::before{display:none!important;}
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;pointer-events:none;}
#topbar-inner{pointer-events:all;background:linear-gradient(180deg,rgba(8,15,10,.97) 85%,transparent);padding:max(10px,env(safe-area-inset-top,10px)) 14px 16px;}
#gps-bar{display:flex;align-items:center;gap:6px;font-size:10px;color:#6b9e70;padding-bottom:6px;margin-bottom:6px;border-bottom:1px solid #1a3a22;}
#gps-dot{width:7px;height:7px;border-radius:50%;background:#4a4a4a;flex-shrink:0;}
#gps-dot.searching{background:#f59e0b;animation:gp 1s infinite;}
#gps-dot.active{background:#22c55e;box-shadow:0 0 6px #22c55e88;animation:gp 2s infinite;}
@keyframes gp{0%,100%{opacity:1}50%{opacity:.4}}
#topbar-title{font-size:10px;letter-spacing:4px;color:#f59e0b;text-transform:uppercase;}
#topbar-heading{font-size:20px;font-weight:bold;color:#f0fdf4;}
#score-strip{display:flex;gap:6px;margin-top:8px;}
.sc{flex:1;background:rgba(13,31,16,.92);border-radius:8px;padding:5px 4px;text-align:center;border:1px solid transparent;}
.sc .l{font-size:7px;letter-spacing:2px;color:#4a7a4e;display:block;}
.sc .v{font-size:16px;font-weight:bold;}
#filter-row{display:flex;gap:6px;margin-top:8px;}
.fb{flex:1;background:transparent;border:1px solid #1a3a22;border-radius:8px;padding:7px 4px;color:#4a7a4e;font-size:11px;cursor:pointer;font-family:Georgia,serif;-webkit-tap-highlight-color:transparent;}
.fb.active{background:#0d2a14;}
/* ── SIDE DRAWER ── */
#bottom-sheet{
  position:fixed;top:0;right:0;bottom:0;
  width:min(300px,80vw);
  z-index:300;
  transition:transform .28s ease;
  display:flex;flex-direction:column;
  pointer-events:all;
}
#bottom-sheet.hidden{transform:translateX(105%);}
#drawer-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  z-index:290;
  display:none;
  -webkit-tap-highlight-color:transparent;
}
#drawer-overlay.show{display:block;}
#sh-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:max(14px,env(safe-area-inset-top,14px)) 16px 12px;
  background:#0d1a10;
  border-bottom:1px solid #1a4a22;
  flex-shrink:0;
}
#sh-bar-title{font-size:13px;font-weight:bold;color:#86efac;letter-spacing:1px;}
#sh-close{
  background:transparent;border:1px solid #1a4a22;
  border-radius:8px;padding:5px 10px;
  color:#4a7a4e;font-size:13px;cursor:pointer;
  font-family:Georgia,serif;
  -webkit-tap-highlight-color:transparent;
}
#sh-inner{
  background:rgba(8,15,10,.98);
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:12px 14px max(20px,env(safe-area-inset-bottom,20px));
}
.fp{position:fixed;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
.fp.show{display:block;}
#panel{background:#080f0a;z-index:300;}
#admin-panel{background:#08080f;z-index:400;}
#prox-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(8,15,10,.97);border:1px solid #22c55e;border-radius:16px;padding:20px 22px;text-align:center;z-index:500;display:none;width:min(340px,92vw);box-shadow:0 8px 40px rgba(0,0,0,.8);}
#prox-toast.show{display:block;animation:ti .3s ease;}
@keyframes ti{from{opacity:0;transform:translate(-50%,-50%) scale(.85)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.lm{width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-size:22px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 12px rgba(0,0,0,.7);cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;}
.lm.rescue{border-radius:12px;}
.lm.done{opacity:.55;}
.lm .pip{position:absolute;bottom:-4px;right:-4px;width:15px;height:15px;border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.4);}
.prox-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid;width:46px;height:46px;opacity:0;pointer-events:none;animation:pr 2s ease-out infinite;}
@keyframes pr{0%{opacity:.7;width:46px;height:46px}100%{opacity:0;width:96px;height:96px}}
.pdot{width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid #22c55e;box-shadow:0 0 0 6px rgba(34,197,94,.2),0 0 18px rgba(34,197,94,.6);}
.btn-primary{display:block;width:100%;background:linear-gradient(135deg,#14532d,#166534);border:1px solid #22c55e;border-radius:12px;padding:14px 16px;color:#f0fdf4;font-family:Georgia,serif;font-size:14px;font-weight:bold;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent;}
.btn-ghost{display:block;width:100%;background:transparent;border:1px solid #1a4a22;border-radius:12px;padding:12px 16px;color:#86efac;font-family:Georgia,serif;font-size:13px;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent;}
.btn-back{background:transparent;border:none;color:#4a7a4e;font-size:13px;cursor:pointer;font-family:Georgia,serif;padding:8px 0;display:block;margin-bottom:6px;-webkit-tap-highlight-color:transparent;}
.field-label,.field-lbl{font-size:11px;color:#86efac;letter-spacing:1px;font-weight:bold;display:block;margin-bottom:5px;}
.field-input,.field-inp{display:block;width:100%;background:#0d1a10;border:1px solid #1a4a22;border-radius:8px;padding:9px 11px;color:#f0fdf4;font-size:13px;font-family:Georgia,serif;outline:none;resize:vertical;-webkit-appearance:none;}
.tag{font-size:10px;padding:3px 9px;border-radius:20px;display:inline-block;}
.sbox,.shaded-box{background:#0d1a10;border:1px solid #1a4a22;border-radius:10px;padding:14px;margin-bottom:14px;font-size:13px;line-height:1.6;}
.loc-row{display:flex;align-items:center;gap:10px;background:#0d1a10;border-radius:10px;padding:10px 12px;cursor:pointer;margin-bottom:6px;border-left:3px solid transparent;-webkit-tap-highlight-color:transparent;}
.loc-row.done{opacity:.6;}
.yt-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;}
.yt-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.prog-bar{height:3px;background:#1a3a22;border-radius:2px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;border-radius:2px;transition:width .4s;}
.admin-tab{flex:1;background:transparent;border:1px solid #1a1a3a;border-radius:7px;padding:6px 2px;color:#6a4a9a;font-size:9px;cursor:pointer;font-family:Georgia,serif;}
.admin-tab.active{background:#1a0a3a;border-color:#7c3aed;color:#c084fc;}
.admin-btn{background:transparent;border:1px solid #1a3a22;border-radius:10px;padding:10px;color:#4a7a4e;font-size:11px;cursor:pointer;font-family:Georgia,serif;letter-spacing:2px;width:100%;margin-top:8px;display:block;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#080f0a;}
::-webkit-scrollbar-thumb{background:#1a4a22;border-radius:2px;}
</style>
</head>
<body>
<div id="map"></div>
<div id="topbar">
  <div id="topbar-inner">
    <div id="gps-bar">
      <div id="gps-dot" class="searching"></div>
      <span id="gps-label">Acquiring GPS&hellip;</span>
      <span id="gps-acc" style="margin-left:auto;color:#4a7a4e"></span>
    </div>
    <div id="topbar-title">UniSQ Toowoomba &middot; Vet &amp; Animal Science</div>
    <div id="topbar-heading">&#128998; Wildlife Field Activity</div>
    <div id="score-strip">
      <div class="sc" style="border-color:rgba(239,68,68,.3)"><span class="l">RESCUES</span><span class="v" id="sc-rescue" style="color:#ef4444">0/4</span></div>
      <div class="sc" style="border-color:rgba(14,165,233,.3)"><span class="l">OBSERVATIONS</span><span class="v" id="sc-obs" style="color:#0ea5e9">0/5</span></div>
      <div class="sc" style="border-color:rgba(245,158,11,.3)"><span class="l">SCORE</span><span class="v" id="sc-score" style="color:#f59e0b">0</span></div>
    </div>
    <div id="filter-row" style="display:flex;gap:6px;align-items:center;margin-top:8px;">
      <button class="fb active" id="f-all"     onclick="setFilter('all')">All</button>
      <button class="fb"        id="f-observe" onclick="setFilter('observe')">Behaviour</button>
      <button class="fb"        id="f-rescue"  onclick="setFilter('rescue')">Rescue</button>
      <button id="menu-btn" onclick="openDrawer()" style="
        flex-shrink:0;background:#0d2a14;border:1px solid #22c55e;
        border-radius:8px;padding:7px 12px;color:#86efac;
        font-family:Georgia,serif;font-size:18px;cursor:pointer;
        -webkit-tap-highlight-color:transparent;line-height:1;
      ">&#9776;</button>
    </div>
  </div>
</div>
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="bottom-sheet" class="hidden">
  <div id="sh-bar">
    <span id="sh-bar-title">LOCATIONS</span>
    <button id="sh-close" onclick="closeDrawer()">&#x2715; Close</button>
  </div>
  <div id="sh-inner">
    <div id="sheet-content"></div>
  </div>
</div>
<div id="prox-toast">
  <div id="pt-emoji" style="font-size:40px;margin-bottom:8px"></div>
  <div style="font-size:10px;letter-spacing:3px;color:#f59e0b;text-transform:uppercase;margin-bottom:4px">YOU&apos;RE HERE</div>
  <div id="pt-title" style="font-size:17px;font-weight:bold;color:#f0fdf4;margin-bottom:6px"></div>
  <div id="pt-dist"  style="font-size:12px;color:#86efac;margin-bottom:14px"></div>
  <button onclick="openFromToast()" style="width:100%;background:linear-gradient(135deg,#14532d,#166534);border:1px solid #22c55e;border-radius:10px;padding:12px;color:#f0fdf4;font-family:Georgia,serif;font-size:13px;font-weight:bold;cursor:pointer;margin-bottom:8px">Open Activity</button>
  <button onclick="dismissToast()" style="width:100%;background:transparent;border:1px solid #1a4a22;border-radius:10px;padding:9px;color:#4a7a4e;font-family:Georgia,serif;font-size:12px;cursor:pointer">Dismiss</button>
</div>
<div id="panel"       class="fp"></div>
<div id="admin-panel" class="fp"></div>
<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
// UniSQ Toowoomba campus centre — Darling Heights, West Street
// Japanese Garden (Ju Raku En) is on the NORTHERN side of campus
// Campus lat/lng verified: -27.6035, 151.9352
// Japanese Garden entrance off West St, northern boundary: ~-27.6010, 151.9345

const CAMPUS_CENTER = [-27.6028, 151.9352];
const PROXIMITY_METRES = 40;

// ─── LOCATION DATA ────────────────────────────────────────────────────────────
// All coordinates verified against OpenStreetMap for UniSQ Toowoomba, Darling Heights QLD
// Japanese Garden (Ju Raku En) occupies the northern section of campus
// Main campus buildings, ovals and carparks are to the south and east
const OBS_STATIONS = [
  {
    // Central lake in the Japanese Garden — main feature with water dragon habitat
    id:"obs1", lat:-27.6008, lng:151.9342, type:"observe",
    title:"Ju Raku En Lake — Water Dragons",
    zone:"JAPANESE GARDEN", emoji:"🐉", colour:"#0ea5e9",
    activity:"B2", activityLabel:"Scan Sampling",
    youtubeId:"G_-FgFzqOqk",
    desc:"Observe the resident water dragon population basking and moving around the lake edge. You will use scan sampling to build a time budget for this group.",
    behaviourFocus:["Basking","Foraging","Alert / head raise","Territorial display","Locomotion — walking","Locomotion — swimming","Fleeing"],
    worksheetFields:[
      {id:"species", label:"Focal species confirmed", type:"text", placeholder:"e.g. Intellagama lesueurii — eastern water dragon"},
      {id:"count",   label:"Number of individuals visible", type:"text", placeholder:"e.g. 3 adults, 1 juvenile"},
      {id:"dominant",label:"Most common behaviour observed", type:"text", placeholder:"e.g. Basking"},
      {id:"scan1",   label:"Scan 1 — behaviour code", type:"text", placeholder:"e.g. BSK"},
      {id:"scan2",   label:"Scan 2 — behaviour code", type:"text", placeholder:""},
      {id:"scan3",   label:"Scan 3 — behaviour code", type:"text", placeholder:""},
      {id:"scan4",   label:"Scan 4 — behaviour code", type:"text", placeholder:""},
      {id:"scan5",   label:"Scan 5 — behaviour code", type:"text", placeholder:""},
      {id:"welfare", label:"Any welfare concerns noted?", type:"select", options:["None observed","Possible — describe in notes","Yes — requires intervention"]},
      {id:"notes",   label:"Field notes (also record on worksheet)", type:"textarea", placeholder:"Additional observations…"},
    ],
    unlockMessage:"Great observation! Transfer your scan data to Activity B2 in your worksheet.",
  },
  {
    // Azalea Hill — elevated area in the north-east section of the Japanese Garden
    id:"obs2", lat:-27.6014, lng:151.9355, type:"observe",
    title:"Azalea Hill — Bird Calls & Movement",
    zone:"JAPANESE GARDEN", emoji:"🐦", colour:"#f59e0b",
    activity:"B4", activityLabel:"Vocalisation Logging",
    youtubeId:"NvgBWcf8KdA",
    desc:"Azalea Hill is one of the best vantage points in the garden for bird activity. Listen carefully and observe movement patterns of any birds present.",
    behaviourFocus:["Singing / calling","Alarm call","Contact call","Foraging — ground","Foraging — foliage","Flight — short hop","Flight — sustained","Preening","Resting"],
    worksheetFields:[
      {id:"species1", label:"Species 1 (or description if unknown)", type:"text", placeholder:"e.g. Noisy miner — grey/yellow, loud 'pee-pee' call"},
      {id:"call1",    label:"Vocalisation description — Species 1", type:"textarea", placeholder:"Pitch, rhythm, duration, context…"},
      {id:"species2", label:"Species 2 (if present)", type:"text", placeholder:""},
      {id:"call2",    label:"Vocalisation description — Species 2", type:"textarea", placeholder:""},
      {id:"eventType",label:"Most frequent event behaviour", type:"text", placeholder:"e.g. Alarm call"},
      {id:"stateType",label:"Most frequent state behaviour", type:"text", placeholder:"e.g. Foraging — foliage"},
      {id:"clinical", label:"Any distress / injury vocalisation?", type:"select", options:["No","Possibly","Yes — unusual call noted"]},
      {id:"notes",    label:"Field notes", type:"textarea", placeholder:""},
    ],
    unlockMessage:"Vocalisation log recorded! Transfer data to Activity B4 in your worksheet.",
  },
  {
    // Western carpark verge — along West Street boundary, lizard habitat strip
    id:"obs3", lat:-27.6040, lng:151.9335, type:"observe",
    title:"West Carpark Verge — Lizard Locomotion",
    zone:"CAMPUS", emoji:"🦎", colour:"#8b5cf6",
    activity:"B3", activityLabel:"Movement & Locomotion",
    youtubeId:"0Xm_a_KBIZY",
    desc:"The vegetated verge along the western carpark edge on West Street is prime blue-tongue habitat. Observe any lizard you find here and record detailed locomotion data.",
    behaviourFocus:["Walking — all four limbs","Running","Tongue flicking","Basking — stationary","Defensive display","Burrowing / hiding","Feeding"],
    worksheetFields:[
      {id:"species",  label:"Species observed", type:"text", placeholder:"e.g. Eastern blue-tongue lizard"},
      {id:"gait",     label:"Gait description", type:"textarea", placeholder:"Stride pattern, limb sequence, body posture during movement…"},
      {id:"speed",    label:"Estimated speed", type:"select", options:["Very slow — deliberate","Slow — leisurely forage","Moderate — purposeful","Fast — fleeing"]},
      {id:"symmetry", label:"Movement symmetry", type:"select", options:["Symmetrical","Slight asymmetry — monitor","Clear asymmetry — clinical concern"]},
      {id:"escape",   label:"Escape distance (how close before it fled)", type:"text", placeholder:"e.g. approx 1.5 metres"},
      {id:"clinical", label:"Clinical assessment", type:"select", options:["Healthy — normal movement","Monitor — minor concern","Intervene — refer to vet"]},
      {id:"notes",    label:"Field notes", type:"textarea", placeholder:""},
    ],
    unlockMessage:"Movement data logged! Transfer your locomotion notes to Activity B3 in your worksheet.",
  },
  {
    // No. 1 Oval and surrounds — main sports oval, central campus
    id:"obs4", lat:-27.6055, lng:151.9368, type:"observe",
    title:"No. 1 Oval Surrounds — Foraging Birds",
    zone:"CAMPUS", emoji:"🦅", colour:"#22c55e",
    activity:"B1", activityLabel:"Ethogram Construction",
    youtubeId:"yJbzFiXLrUk",
    desc:"The main oval and its surrounds attract ibis, magpies, corellas and miners throughout the day. This is your ethogram construction site — wide open sightlines make observation easy.",
    behaviourFocus:["Probing — bill into ground","Surface pecking","Vigilance — head up","Walking — forage pace","Running","Chasing","Allopreening","Vocalising","Taking flight","Landing"],
    worksheetFields:[
      {id:"species", label:"Primary species for ethogram", type:"text", placeholder:"e.g. Australian White Ibis"},
      {id:"beh1",    label:"Behaviour 1 — name + definition", type:"textarea", placeholder:"Name: Probing\nDef: Bill inserted vertically into substrate >1cm…"},
      {id:"beh2",    label:"Behaviour 2 — name + definition", type:"textarea", placeholder:""},
      {id:"beh3",    label:"Behaviour 3 — name + definition", type:"textarea", placeholder:""},
      {id:"beh4",    label:"Behaviour 4 — name + definition", type:"textarea", placeholder:""},
      {id:"events",  label:"List your EVENT behaviours", type:"text", placeholder:"e.g. Taking flight, Landing, Chase"},
      {id:"states",  label:"List your STATE behaviours", type:"text", placeholder:"e.g. Probing, Vigilance, Allopreening"},
      {id:"notes",   label:"Field notes", type:"textarea", placeholder:""},
    ],
    unlockMessage:"Ethogram recorded! Transfer your behaviour definitions to Activity B1 in your worksheet.",
  },
  {
    // Large established trees along northern boundary near garden/campus interface
    id:"obs5", lat:-27.6022, lng:151.9360, type:"observe",
    title:"Campus Trees — Nocturnal Species Roost",
    zone:"CAMPUS", emoji:"🦉", colour:"#ec4899",
    activity:"B5", activityLabel:"Field Sketch",
    youtubeId:"rNe71GXMABY",
    desc:"Large established eucalypts and Moreton Bay figs along the campus–garden boundary are known roosting sites for tawny frogmouths and brushtail possums. Look carefully — they are masters of camouflage.",
    behaviourFocus:["Roosting — cryptic posture","Roosting — open perch","Alert — eye tracking","Alarm — wing spread","Sleeping — eyes closed","Thermoregulating"],
    worksheetFields:[
      {id:"found",     label:"Did you locate an animal?", type:"select", options:["Yes — animal present","Roost site found, animal absent","No roost located"]},
      {id:"species",   label:"Species identified or suspected", type:"text", placeholder:"e.g. Tawny frogmouth — bark-patterned, horizontal posture"},
      {id:"height",    label:"Roost height (estimated)", type:"text", placeholder:"e.g. approx 4 metres"},
      {id:"posture",   label:"Posture / cryptic behaviour", type:"textarea", placeholder:"How does the animal conceal itself?…"},
      {id:"sketch",    label:"Sketch completed in worksheet?", type:"select", options:["Yes — done","Partially complete","No — animal not visible"]},
      {id:"annotated", label:"Annotations added?", type:"select", options:["Yes — all 10 items","Partially — 5 or more","Not yet"]},
      {id:"notes",     label:"Field notes", type:"textarea", placeholder:""},
    ],
    unlockMessage:"Roost site logged! Complete your field sketch in Activity B5 of your worksheet.",
  },
];

const RESCUE_INCIDENTS = [
  {
    // Western carpark entrance off West Street — road traffic zone
    id:"r1", lat:-27.6038, lng:151.9330, type:"rescue",
    location:"West Carpark — Entrance Road (West St)", zone:"CAMPUS",
    scenario:"road_traffic", animal:"Eastern Blue-tongue Lizard", emoji:"🦎", severity:"HIGH",
    description:"A blue-tongue lizard has been struck by a slow-moving vehicle near the carpark entrance on West Street. It is conscious but unable to move its hindquarters.",
    fieldNotes:"Blue-tongue lizards (Tiliqua scincoides) are common in urban Toowoomba. Spinal injuries from vehicle strikes require immediate immobilisation. Do NOT pick up by the tail.",
    conservation:"Least Concern — but urban road mortality is a significant local pressure.",
    referral:"West Toowoomba Vet Surgery · (07) 4636 2027 · 357 West St (2 min from campus)",
    quizQuestions:[
      {q:"What is your FIRST action at the scene?",options:["Pick it up immediately","Assess scene for ongoing traffic danger first","Pour water on it","Leave it — lizards self-heal"],correct:1,explanation:"Scene safety always comes first. Ensure no further vehicles can strike the animal or you before approaching."},
      {q:"How should you contain this lizard for transport?",options:["Pillowcase tied at top","Ventilated cardboard box lined with a towel","Plastic bag with water","Open tray — it needs air"],correct:1,explanation:"A ventilated, dark box reduces stress. Towel lining prevents sliding on hard surfaces."},
      {q:"Where do you take a suspected spinal injury reptile?",options:["Release in nearby bushland","West Toowoomba Vet Surgery or RSPCA","The Japanese Garden pond","Leave overnight"],correct:1,explanation:"Suspected spinal injuries need radiography. West Toowoomba Vet Surgery on West St handles wildlife and is the RSPCA's official local vet."},
    ],
    treatments:[
      {label:"🚗 Clear traffic from the area",correct:true},
      {label:"📦 Ventilated dark box with towel",correct:true},
      {label:"💊 Administer human pain relief",correct:false},
      {label:"📞 Call West Toowoomba Vet or RSPCA",correct:true},
      {label:"🏃 Move it quickly to nearby grass",correct:false},
    ]
  },
  {
    // Central lake bridge inside the Japanese Garden
    id:"r2", lat:-27.6010, lng:151.9345, type:"rescue",
    location:"Ju Raku En — Central Lake Bridge", zone:"JAPANESE GARDEN",
    scenario:"flood", animal:"Australian Water Dragon", emoji:"🐉", severity:"MEDIUM",
    description:"Heavy overnight rain has flooded the low path near the lake. A water dragon is stranded on an isolated rock, surrounded by fast-flowing water. It appears exhausted.",
    fieldNotes:"Water dragons (Intellagama lesueurii) are strong swimmers but can exhaust and drown in sustained flood conditions. The Ju Raku En lake hosts a known resident population.",
    conservation:"Least Concern — population stable in Toowoomba riparian zones.",
    referral:"RSPCA Toowoomba · 1300 ANIMAL (if injured after rescue)",

// ── Edit mode ─────────────────────────────────────────────────────────────────
function enableEditMode() {
  editModeActive = true;
  allLocs().forEach(loc => {
    const m = leafletMarkers[loc.id];
    if (m) { m.dragging.enable(); const el = m.getElement(); if (el) el.style.cursor = 'grab'; }
  });
  showDragHint();
  const btn = document.getElementById('edit-mode-btn');
  if (btn) { btn.textContent = '🔒 Lock Positions'; btn.style.cssText += ';border-color:#22c55e;color:#86efac;background:#0d2a14'; }
}

function disableEditMode() {
  editModeActive = false;
  allLocs().forEach(loc => {
    const m = leafletMarkers[loc.id];
    if (m) { m.dragging.disable(); const el = m.getElement(); if (el) el.style.cursor = 'pointer'; }
  });
  hideDragHint();
  const btn = document.getElementById('edit-mode-btn');
  if (btn) { btn.textContent = '✋ Drag to Reposition'; btn.style.cssText += ';border-color:#a855f7;color:#c084fc;background:transparent'; }
  const count = Object.keys(coordOverrides).length;
  if (count > 0) showSavedToast(`🔒 Positions locked — ${count} location${count>1?'s':''} repositioned`, '#22c55e');
}

  if (editModeActive) disableEditMode(); else enableEditMode();

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function allLocs() { return [...ALL_LOCATIONS, ...customStations]; }
function getLoc(id) { return allLocs().find(l => l.id === id); }
function isDone(loc) { return loc.type === "observe" ? completedStations.has(loc.id) : rescueState[loc.id]?.rescued; }

function rescueCompleted() { return Object.values(rescueState).filter(s => s.rescued).length; }
function obsCompleted() { return completedStations.size; }

function updateScoreStrip() {
  document.getElementById("sc-rescue").textContent = `${rescueCompleted()}/4`;
  document.getElementById("sc-obs").textContent = `${obsCompleted()}/${[...OBS_STATIONS,...customStations].length}`;
  document.getElementById("sc-score").textContent = score;
}

// ─── MARKERS ─────────────────────────────────────────────────────────────────
function markerHTML(loc) {
  const done = isDone(loc);
  const isObs = loc.type === "observe";
  const colour = isObs ? loc.colour : (SEV[loc.severity]?.border || "#888");
  const shape = isObs ? "50%" : "10px";
  return `
    <div class="lm ${isObs?'':'rescue'} ${done?'done':''}"
         style="background:${done?'#0d2a10':'#0a0a12'};border-color:${done?'#22c55e':colour};
                box-shadow:0 0 14px ${colour}66;border-radius:${shape}">
      ${done ? '✅' : loc.emoji}
      <div class="pip" style="background:${colour}">
        ${isObs ? '👁' : '🚨'}
      </div>
      ${!done ? `<div class="prox-ring" style="border-color:${colour}"></div>` : ''}
    </div>`;
}

function addMarker(loc) {
  const icon = L.divIcon({ html: markerHTML(loc), className: '', iconSize: [46,46], iconAnchor: [23,23] });
  const coords = getCoords(loc);
  const marker = L.marker([coords.lat, coords.lng], { icon, draggable: false })
    .addTo(map)
    .on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      if (editModeActive) { showCoordToast(loc); return; }
      openLocation(loc.id);
    })
    .on('dragstart', () => { hideDragHint(); })
    .on('drag', (e) => {
      const { lat, lng } = e.target.getLatLng();
      showDragCoordBadge(loc.id, lat, lng);
    })
    .on('dragend', (e) => {
      const { lat, lng } = e.target.getLatLng();
      updateLocCoords(loc.id, lat, lng);
      hideDragCoordBadge();
      const name = loc.type==='observe'?loc.title:loc.animal; showSavedToast(`✅ <strong>${name.slice(0,28)}</strong> moved to<br/>${lat.toFixed(5)}, ${lng.toFixed(5)}`, '#22c55e');
    });

  const subtitle = loc.type === "observe" ? `${loc.activityLabel} · ${loc.activity}` : loc.location;
  marker.bindTooltip(
    `<div style="font-family:'Georgia',serif;font-size:12px;font-weight:bold;color:#f0fdf4">${loc.emoji} ${loc.type==="observe"?loc.title:loc.animal}</div><div style="font-size:10px;color:#86efac">${subtitle}</div>`,
    { direction:'top', offset:[0,-20], className:'leaflet-dark-tooltip', permanent:false, opacity:0.95 }
  );
  leafletMarkers[loc.id] = marker;
}

function refreshMarker(id) {
  const loc = getLoc(id);
  if (!loc || !leafletMarkers[id]) return;
  const icon = L.divIcon({ html: markerHTML(loc), className: '', iconSize: [38,38], iconAnchor: [19,19] });
  leafletMarkers[id].setIcon(icon);
}

// ─── GPS ─────────────────────────────────────────────────────────────────────
function initGPS() {
  const dot = document.getElementById('gps-dot');
  const lbl = document.getElementById('gps-label');
  const acc = document.getElementById('gps-acc');

  if (!navigator.geolocation) {
    dot.style.background = '#ef4444';
    lbl.textContent = 'GPS not available — using campus centre';
    lbl.style.color = '#ef4444';
    playerPos = { lat: CAMPUS_CENTER[0], lng: CAMPUS_CENTER[1] };
    placePlayerMarker(playerPos);
    return;
  }

  dot.className = 'searching';
  lbl.textContent = 'Acquiring GPS…';

  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      playerPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      dot.id = 'gps-dot';
      dot.className = 'active';
      lbl.textContent = 'GPS active';
      lbl.style.color = '#22c55e';
      acc.textContent = `±${Math.round(pos.coords.accuracy)}m`;
      placePlayerMarker(playerPos);
      checkProximity();
    },
    (err) => {
      dot.className = '';
      dot.style.background = '#f59e0b';
      lbl.textContent = 'GPS denied — showing campus centre';
      lbl.style.color = '#f59e0b';
      // Fallback to campus centre
      if (!playerPos) {
        playerPos = { lat: CAMPUS_CENTER[0], lng: CAMPUS_CENTER[1] };
        placePlayerMarker(playerPos);
      }
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 3000 }
  );
}

function placePlayerMarker(pos) {
  const icon = L.divIcon({ html: '<div class="player-marker"></div>', className: '', iconSize: [16,16], iconAnchor: [8,8] });
  if (!playerMarker) {
    playerMarker = L.marker([pos.lat, pos.lng], { icon, zIndexOffset: 1000 }).addTo(map);
    // Accuracy circle
    L.circle([pos.lat, pos.lng], { radius: PROXIMITY_METRES, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 0.05, weight: 1, dashArray: '4,4' }).addTo(map);
  } else {
    playerMarker.setLatLng([pos.lat, pos.lng]);
  }
}

// ─── PROXIMITY CHECK ─────────────────────────────────────────────────────────
function checkProximity() {
  if (!playerPos || currentView !== 'map') return;
  const filtered = allLocs().filter(l => currentFilter === 'all' || l.type === currentFilter);

  filtered.forEach(loc => {
    if (isDone(loc)) return;
    if (notifiedProximity.has(loc.id)) return;
    const dist = haversine(playerPos.lat, playerPos.lng, loc.lat, loc.lng);
    if (dist <= PROXIMITY_METRES) {
      notifiedProximity.add(loc.id);
      showProximityToast(loc, Math.round(dist));
    }
  });
}

function showProximityToast(loc, dist) {
  toastLocationId = loc.id;
  document.getElementById('pt-emoji').textContent = loc.emoji;
  document.getElementById('pt-title').textContent = loc.type === 'observe' ? loc.title : loc.animal;
  document.getElementById('pt-dist').textContent = `You're within ${dist}m · Tap to begin ${loc.type === 'observe' ? 'observation' : 'rescue activity'}`;
  document.getElementById('pt-title').style.color = loc.type === 'observe' ? loc.colour : (SEV[loc.severity]?.border || '#f59e0b');
  document.getElementById('prox-toast').className = 'show';
  // Auto-dismiss after 12 seconds
  setTimeout(dismissToast, 12000);
}

function dismissToast() {
  document.getElementById('prox-toast').className = '';
  toastLocationId = null;
}

function openFromToast() {
  const id = toastLocationId;
  dismissToast();
  if (id) openLocation(id);
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  ['all','observe','rescue'].forEach(id => {
    const btn = document.getElementById('f-'+id);
    if (!btn) return;
    btn.classList.toggle('active', id === f);
    const colors = {all:'#86efac',observe:'#0ea5e9',rescue:'#ef4444'};
    btn.style.color = id === f ? colors[id] : '#4a7a4e';
    btn.style.borderColor = id === f ? colors[id] : '#1a3a22';
  });
  // Show/hide markers on map
  allLocs().forEach(loc => {
    const marker = leafletMarkers[loc.id];
    if (!marker) return;
    if (f === 'all' || loc.type === f) marker.addTo(map);
    else map.removeLayer(marker);
  });
  showLocationList();
}

// ─── BOTTOM SHEET ─────────────────────────────────────────────────────────────
function showLocationList() {
  const sheet = document.getElementById('bottom-sheet');
  const content = document.getElementById('sheet-content');
  openDrawer();
  const locs = allLocs().filter(l => currentFilter === 'all' || l.type === currentFilter);

  const titleEl = document.getElementById('sh-bar-title');
  if(titleEl) titleEl.textContent = currentFilter==='all'?'ALL LOCATIONS':currentFilter==='observe'?'BEHAVIOUR STATIONS':'RESCUE INCIDENTS';
  content.innerHTML = '';

  locs.forEach(loc => {
    const done = isDone(loc);
    const isObs = loc.type === 'observe';
    const colour = isObs ? loc.colour : (SEV[loc.severity]?.border || '#888');
    const zc = ZONE_COLORS[loc.zone] || ZONE_COLORS.CAMPUS;
    const dist = playerPos ? Math.round(haversine(playerPos.lat, playerPos.lng, loc.lat, loc.lng)) : null;

    const row = document.createElement('div');
    row.className = `loc-row ${done?'done':''}`;
    row.style.borderLeftColor = done ? '#22c55e' : colour;
    row.style.borderColor = `${done?'rgba(34,197,94,0.25)':colour+'25'}`;
    row.onclick = () => { closeDrawer(); openLocation(loc.id); };

    row.innerHTML = `
      <span style="font-size:20px">${done?'✅':loc.emoji}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:bold;color:${done?'#4a7a4e':'#f0fdf4'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          ${isObs ? loc.title : loc.animal}
        </div>
        <div style="font-size:10px;color:#6b9e70">${isObs ? `${loc.activityLabel} · ${loc.activity}` : `${SCN[loc.scenario]?.icon||''} ${loc.location}`}</div>
        <div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap">
          <span class="tag" style="background:${zc.bg};color:${zc.text}">${zc.label}</span>
          <span class="tag" style="background:${colour}22;color:${colour}">${isObs?'👁 Observe':`${SEV[loc.severity]?.icon||''} ${loc.severity}`}</span>
          ${dist!==null ? `<span class="tag" style="background:#1a1a2a;color:#6b9e70">${dist<1000?dist+'m':(dist/1000).toFixed(1)+'km'}</span>` : ''}
        </div>
      </div>
      <div style="font-size:10px;color:${done?'#22c55e':'#4a7a4e'};flex-shrink:0">${done?'Done ✓':'→'}</div>`;
    content.appendChild(row);
  });

  // Admin button at bottom
  content.innerHTML += `<button class="admin-btn" onclick="closeDrawer();showAdminLogin()">🔒 LECTURER ADMIN</button>`;
}

// ─── OPEN LOCATION ────────────────────────────────────────────────────────────
function openLocation(id) {
  activeLocationId = id;
  const loc = getActivity(id);
  if (!loc) return;
  const coords = getCoords(loc);
  map.panTo([coords.lat, coords.lng], { animate: true, duration: 0.5 });
  if (loc.type === 'observe') showObsIntro(loc);
  else {
    rescueState[id] = { ...(rescueState[id]||{}), found: true };
    showEncounter(loc);
  }
}

// ─── PANEL HELPERS ────────────────────────────────────────────────────────────
function showPanel(html) {
  const panel = document.getElementById('panel');
  panel.innerHTML = html;
  panel.className = 'show';
  panel.scrollTop = 0;
  currentView = 'panel';
}

function closePanel() {
  document.getElementById('panel').className = '';
  currentView = 'map';
  activeLocationId = null;
}

function backBtn(onclick, label='← Back') {
  return `<button class="btn-back" onclick="${onclick}">${label}</button>`;
}

function zoneTag(zone) {
  const zc = ZONE_COLORS[zone] || ZONE_COLORS.CAMPUS;
  return `<span class="tag" style="background:${zc.bg};color:${zc.text}">${zc.label}</span>`;
}

// ─── OBS RECORD ──────────────────────────────────────────────────────────────
function showObsRecord(id) {
  const loc = getActivity(id);
  if (!loc) return;
  const answers = obsAnswers[id] || {};
  const required = loc.worksheetFields.filter(f => f.id !== 'notes');
  const filled = required.filter(f => answers[f.id]?.trim()).length;
  const pct = required.length > 0 ? Math.round((filled/required.length)*100) : 0;
  const timeStr = new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
  const chips = loc.behaviourFocus.map(b =>
    `<span class="tag" style="background:${loc.colour}14;color:${loc.colour}bb;margin:2px;font-size:10px">${b}</span>`
  ).join('');

  const fieldsHTML = loc.worksheetFields.map(f => {
    const val = answers[f.id] || '';
    let input = '';
    if (f.type === 'select') {
      const opts = f.options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('');
      input = `<select class="field-input" onchange="setField('${id}','${f.id}',this.value)" style="cursor:pointer"><option value="">— Select —</option>${opts}</select>`;
    } else if (f.type === 'textarea') {
      input = `<textarea class="field-input" rows="3" placeholder="${f.placeholder||''}" onchange="setField('${id}','${f.id}',this.value)">${val}</textarea>`;
    } else {
      input = `<input class="field-input" type="text" placeholder="${f.placeholder||''}" value="${val}" oninput="setField('${id}','${f.id}',this.value)"/>`;
    }
    return `<div style="margin-bottom:12px"><label class="field-label">${f.label}</label>${input}</div>`;
  }).join('');

  const canSubmit = filled >= required.length;

  showPanel(`
    <div style="background:#0a0a12;border-bottom:1px solid ${loc.colour}44;padding:12px 18px;position:sticky;top:0;z-index:10">
      ${backBtn(`showObsVideo('${id}')`,'← Back to video')}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <div>
          <div style="font-size:13px;font-weight:bold;color:#f0fdf4">${loc.emoji} ${loc.title}</div>
          <div style="font-size:10px;color:${loc.colour}">Worksheet ${loc.activity} — ${loc.activityLabel}</div>
        </div>
        <div style="font-size:10px;color:#4a7a4e;text-align:right">${filled}/${required.length} fields</div>
      </div>
      <div class="prog-bar" style="margin-top:8px"><div class="prog-fill" style="width:${pct}%;background:${loc.colour}"></div></div>
    </div>
    <div style="padding:14px 16px">
      <div style="background:#0d1a10;border:1px solid ${loc.colour}33;border-radius:10px;padding:10px 14px;margin-bottom:12px">
        <div style="font-size:10px;color:${loc.colour};letter-spacing:2px;margin-bottom:4px">AUTO-LOGGED</div>
        <div style="font-size:12px;color:#86efac">📍 ${loc.title} · 🕐 ${timeStr}</div>
      </div>
      <div style="background:#0a0a12;border:1px solid ${loc.colour}22;border-radius:10px;padding:10px 14px;margin-bottom:14px">
        <div style="font-size:10px;color:#4a7a4e;letter-spacing:1px;margin-bottom:6px">BEHAVIOUR REFERENCE</div>
        <div style="line-height:2">${chips}</div>
      </div>
      <div id="obs-fields">${fieldsHTML}</div>
      <button id="submit-obs-btn" class="btn-primary" onclick="submitObs('${id}')"
        style="${canSubmit?'':'background:#1a1a1a;border-color:#333;color:#4a4a4a;cursor:default'}">
        ${canSubmit ? '✅ Submit & Unlock Next Location →' : `Complete all fields to submit (${required.length - filled} remaining)`}
      </button>
      <div style="font-size:11px;color:#4a7a4e;text-align:center;font-style:italic;margin-top:12px">
        Transfer these observations to Activity ${loc.activity} in your paper worksheet for full marks.
      </div>
    </div>
  `);
}

function setField(stationId, fieldId, val) {
  if (!obsAnswers[stationId]) obsAnswers[stationId] = {};
  obsAnswers[stationId][fieldId] = val;
  const loc = getActivity(stationId);
  if (!loc) return;
  const required = loc.worksheetFields.filter(f => f.id !== 'notes');
  const filled = required.filter(f => obsAnswers[stationId][f.id]?.trim()).length;
  const pct = Math.round((filled/required.length)*100);
  const btn = document.getElementById('submit-obs-btn');
  const bar = document.querySelector('.prog-fill');
  if (bar) bar.style.width = pct + '%';
  const counter = document.querySelector('[style*="text-align:right"]');
  if (btn) {
    const canSubmit = filled >= required.length;
    btn.textContent = canSubmit ? '✅ Submit & Unlock Next Location →' : `Complete all fields to submit (${required.length - filled} remaining)`;
    btn.style.cssText = canSubmit ? '' : 'background:#1a1a1a;border-color:#333;color:#4a4a4a;cursor:default;width:100%;border-radius:12px;padding:14px;font-family:Georgia,serif;font-size:14px;font-weight:bold';
    btn.onclick = canSubmit ? () => submitObs(stationId) : null;
  }
}

function submitObs(id) {
  const loc = getActivity(id);
  if (!loc) return;
  const required = loc.worksheetFields.filter(f => f.id !== 'notes');
  const filled = required.filter(f => obsAnswers[id]?.[f.id]?.trim()).length;
  if (filled < required.length) return;
  completedStations.add(id);
  score += 20;
  updateScoreStrip();
  refreshMarker(id);
  showObsComplete(loc);
}

        📋 Transfer these to <strong>Activity ${loc.activity}</strong> in your paper worksheet.

      <div style="font-size:22px;font-weight:bold;color:#f59e0b;margin-bottom:6px">+20 pts · Total: ${score}</div>

// ─── QUIZ ─────────────────────────────────────────────────────────────────────
function startQuiz(id) {
  quizStep = 0; selectedAnswer = null;
  showQuizStep(id);
}

function showQuizStep(id) {
  const loc = getActivity(id);
  if (!loc) return;
  const q = loc.quizQuestions[quizStep];
  const progress = loc.quizQuestions.map((_,i) =>
    `<div style="flex:1;height:4px;border-radius:2px;background:${i<quizStep?'#22c55e':i===quizStep?'#60a5fa':'#1a3a3a'}"></div>`
  ).join('');

  const opts = q.options.map((opt, i) => {
    let bg='#0d1a10', border='#1a4a22', color='#d4f0d4';
    if (selectedAnswer !== null) {
      if (i === q.correct) { bg='#14532d'; border='#22c55e'; color='#f0fdf4'; }
      else if (i === selectedAnswer && i !== q.correct) { bg='#450a0a'; border='#ef4444'; color='#fca5a5'; }
    }
    return `<button onclick="answerQuiz('${id}',${i})" style="width:100%;background:${bg};border:1px solid ${border};border-radius:10px;padding:12px 14px;color:${color};font-family:'Georgia',serif;font-size:13px;cursor:${selectedAnswer===null?'pointer':'default'};text-align:left;margin-bottom:8px;transition:all 0.2s">
      <span style="color:#4a7a4e;margin-right:8px">${String.fromCharCode(65+i)}.</span>${opt}${selectedAnswer!==null&&i===q.correct?' ✓':''}${selectedAnswer!==null&&i===selectedAnswer&&i!==q.correct?' ✗':''}
    </button>`;
  }).join('');

  const explanationHTML = selectedAnswer !== null ? `
    <div style="background:#0d1f0a;border:1px solid #22c55e44;border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;letter-spacing:2px;color:#4aa44a;margin-bottom:5px">💡 EXPLANATION</div>
      <div style="font-size:13px;color:#d4f0d4;line-height:1.6">${q.explanation}</div>
    </div>
    <button class="btn-primary" onclick="${quizStep+1 < loc.quizQuestions.length ? `nextQuizStep('${id}')` : `showTreatment('${id}')`}" style="text-align:center">
      ${quizStep+1 < loc.quizQuestions.length ? 'Next Question →' : 'Proceed to Treatment →'}
    </button>` : '';

  showPanel(`
    <div style="background:#0a1a1a;border-bottom:1px solid #1a4a44;padding:14px 18px">
      <div style="font-size:10px;letter-spacing:3px;color:#4aa4a0;text-transform:uppercase;margin-bottom:6px">Clinical Assessment · Q${quizStep+1} of ${loc.quizQuestions.length}</div>
      <div style="display:flex;gap:6px">${progress}</div>
    </div>
    <div style="padding:18px">
      <div style="font-size:10px;color:#6b9e70;margin-bottom:10px">${loc.emoji} ${loc.animal}</div>
      <div class="shaded-box" style="font-size:15px;font-weight:bold;color:#f0fdf4;line-height:1.6;margin-bottom:18px">${q.q}</div>
      <div id="quiz-opts">${opts}</div>
      <div id="quiz-expl">${explanationHTML}</div>
    </div>
  `);
}

function answerQuiz(id, idx) {
  if (selectedAnswer !== null) return;
  selectedAnswer = idx;
  const loc = getLoc(id);
  if (!loc) return;
  const q = loc.quizQuestions[quizStep];
  if (idx === q.correct) score += 10;
  updateScoreStrip();
  showQuizStep(id);
}

function nextQuizStep(id) {
  quizStep++;
  selectedAnswer = null;
  showQuizStep(id);
}

// ─── TREATMENT ────────────────────────────────────────────────────────────────
function showTreatment(id) {
  treatSel = []; treatSubmitted = false;
  renderTreatment(id);
}

function renderTreatment(id) {
  const loc = getActivity(id);
  if (!loc) return;
  const items = loc.treatments.map((t, i) => {
    let bg='#0d1a10', border='#1a4a22', color='#d4f0d4';
    const sel = treatSel.includes(i);
    if (!treatSubmitted) { if (sel) { bg='#0d2a40'; border='#3b82f6'; color='#f0fdf4'; } }
    else {
      if (t.correct && sel) { bg='#14532d'; border='#22c55e'; color='#f0fdf4'; }
      else if (t.correct && !sel) { bg='#1a2a14'; border='#22c55e88'; color='#86efac'; }
      else if (!t.correct && sel) { bg='#450a0a'; border='#ef4444'; color='#fca5a5'; }
    }
    const badge = treatSubmitted
      ? (t.correct ? `<span style="color:#22c55e;font-size:11px">✓ Correct</span>` : sel ? `<span style="color:#ef4444;font-size:11px">✗ Wrong</span>` : `<span style="color:#22c55e88;font-size:10px">Should include</span>`)
      : (sel ? `<span style="color:#60a5fa">✓</span>` : '');
    return `<button onclick="${treatSubmitted?'':'toggleTreat('+i+',\''+id+'\')'}" style="width:100%;background:${bg};border:1px solid ${border};border-radius:10px;padding:12px 14px;color:${color};font-family:'Georgia',serif;font-size:13px;cursor:${treatSubmitted?'default':'pointer'};text-align:left;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;transition:all 0.2s">
      <span>${t.label}</span>${badge}
    </button>`;
  }).join('');

  const actionBtn = treatSubmitted
    ? `<button class="btn-primary" onclick="completeRescue('${id}')" style="text-align:center">🏆 Complete Rescue! →</button>`
    : `<button onclick="submitTreatment('${id}')" style="width:100%;background:linear-gradient(135deg,#7c2d12,#9a3412);border:1px solid #ea580c;border-radius:12px;padding:14px;color:#fed7aa;font-family:'Georgia',serif;font-size:14px;font-weight:bold;cursor:pointer">Submit Treatment Plan</button>`;

  showPanel(`
    <div style="background:#1a0a00;border-bottom:1px solid #ea580c44;padding:14px 18px">
      <div style="font-size:10px;letter-spacing:3px;color:#fb923c;text-transform:uppercase;margin-bottom:4px">Treatment Plan</div>
      <div style="font-size:18px;font-weight:bold;color:#f0fdf4">Select all correct actions</div>
      <div style="font-size:11px;color:#9a6a44">Incorrect choices affect your score</div>
    </div>
    <div style="padding:16px 18px">
      <div style="font-size:11px;color:#6b9e70;margin-bottom:12px">${loc.emoji} ${loc.animal}</div>
      <div id="treat-items">${items}</div>
      ${actionBtn}
    </div>
  `);
}

function toggleTreat(i, id) {
  if (treatSubmitted) return;
  treatSel = treatSel.includes(i) ? treatSel.filter(x=>x!==i) : [...treatSel,i];
  renderTreatment(id);
}

function submitTreatment(id) {
  treatSubmitted = true;
  const loc = getActivity(id);
  if (loc) { const pts = loc.treatments.filter((t,i) => t.correct === treatSel.includes(i)).length; score += pts * 5; }
  updateScoreStrip();
  renderTreatment(id);
}

function completeRescue(id) {
  rescueState[id] = { ...(rescueState[id]||{}), rescued: true };
  score += 25;
  updateScoreStrip();
  refreshMarker(id);
  showRescueComplete(id);
}

function showRescueComplete(id) {
  const loc = getActivity(id);
  if (!loc) return;
  showPanel(`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px 20px;text-align:center">
      <div style="font-size:56px;margin-bottom:8px">🏆</div>
      <div style="font-size:10px;letter-spacing:4px;color:#f59e0b;text-transform:uppercase;margin-bottom:6px">Rescue Complete</div>
      <div style="font-size:22px;font-weight:bold;color:#f0fdf4;margin-bottom:4px">${loc.animal}</div>
      <div style="font-size:13px;color:#86efac;margin-bottom:20px">Successfully assessed and referred</div>
      <div style="background:#0d2a14;border:1px solid #22c55e44;border-radius:14px;padding:16px 18px;margin-bottom:16px;width:100%;text-align:left">
        <div style="font-size:10px;color:#4a7a4e;letter-spacing:2px;margin-bottom:10px">FIELD LOG</div>
        ${[['Species',loc.animal],['Location',loc.location],['Referral',loc.referral],['Status','Referred ✓']].map(([l,v],i)=>`
          <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:${i<3?'1px solid #1a4a2244':'none'}">
            <span style="font-size:11px;color:#4a7a4e">${l}</span>
            <span style="font-size:11px;color:#d4f0d4;text-align:right;max-width:60%">${v}</span>
          </div>`).join('')}
      </div>
      <div style="font-size:22px;font-weight:bold;color:#f59e0b;margin-bottom:6px">+25 pts · Total: ${score}</div>
      <div style="font-size:12px;color:#6b9e70;margin-bottom:22px">${obsCompleted()} observations · ${rescueCompleted()}/4 rescues</div>
      <button class="btn-primary" onclick="closePanel()" style="text-align:center;max-width:260px">🗺️ Back to Map →</button>
    </div>
  `);
}

// ── Editor live-save helpers ──────────────────────────────────────────────────
function editorSave(id) {
  const loc = getActivity(id);
  if (!loc) return;
  const isObs = loc.type === 'observe';
  const edits = {};
  const g = (elId) => { const el = document.getElementById(elId); return el ? el.value : null; };

  if (isObs) {
    const t = g('ed-title'); if (t !== null) edits.title = t;
    const a = g('ed-activity'); if (a !== null) edits.activity = a;
    const d = g('ed-desc'); if (d !== null) edits.desc = d;
    const bf = g('ed-behaviourFocus'); if (bf !== null) edits.behaviourFocus = bf.split('\n').map(s=>s.trim()).filter(Boolean);
  } else {
    const t = g('ed-title'); if (t !== null) edits.animal = t;
    const loc2 = g('ed-location'); if (loc2 !== null) edits.location = loc2;
    const d = g('ed-desc'); if (d !== null) edits.description = d;
    const fn = g('ed-fieldNotes'); if (fn !== null) edits.fieldNotes = fn;
    const ref = g('ed-referral'); if (ref !== null) edits.referral = ref;
    const sev = g('ed-severity'); if (sev !== null) edits.severity = sev;
    const scn = g('ed-scenario'); if (scn !== null) edits.scenario = scn;
  }
  const yt = g('ed-youtube'); if (yt !== null) edits.youtubeId = yt.trim();

  saveActivityEdits(id, edits);
  // Flash saved message
  const msg = document.getElementById('ed-saved-msg');
  if (msg) { msg.style.display='block'; clearTimeout(msg._t); msg._t = setTimeout(()=>{ msg.style.display='none'; }, 1800); }
}

// Quiz helpers
function editorGetQuizQuestions(id) {
  return JSON.parse(JSON.stringify(getActivity(id).quizQuestions || []));
}
function editorSetQuizQ(id, qi, val) {
  const qs = editorGetQuizQuestions(id); qs[qi].q = val; saveActivityEdits(id, {quizQuestions: qs});
}
function editorSetOption(id, qi, oi, val) {
  const qs = editorGetQuizQuestions(id); qs[qi].options[oi] = val; saveActivityEdits(id, {quizQuestions: qs});
}
function editorSetCorrect(id, qi, oi) {
  const qs = editorGetQuizQuestions(id); qs[qi].correct = oi; saveActivityEdits(id, {quizQuestions: qs});
  // Re-render just the options row
  const row = document.getElementById('ed-quiz-rows');
  if (row) row.innerHTML = qs.map((q,i)=> {
    // rebuild inline using same logic
    const opts = (q.options||['','','']).map((o,j)=>`
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:5px">
        <button onclick="editorSetCorrect('${id}',${i},${j})" style="flex-shrink:0;width:28px;height:28px;border-radius:6px;background:${q.correct===j?'#14532d':'#0d0d1a'};border:1px solid ${q.correct===j?'#22c55e':'#2a2a4a'};color:${q.correct===j?'#86efac':'#4a4a6a'};font-size:12px;cursor:pointer;font-family:Georgia,serif">${q.correct===j?'✓':String.fromCharCode(65+j)}</button>
        <input value="${(o||'').replace(/"/g,'&quot;')}" oninput="editorSetOption('${id}',${i},${j},this.value)" style="flex:1;background:#0d0d1a;border:1px solid #2a2a4a;border-radius:7px;padding:7px 9px;color:#e8e0ff;font-size:12px;font-family:Georgia,serif;outline:none"/>
      </div>`).join('');
    return `<div style="background:#0a0a16;border:1px solid #2a1a4a;border-radius:10px;padding:12px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:10px;color:#a855f7;font-weight:bold;letter-spacing:1px">Q${i+1}</span><button onclick="editorRemoveQuiz('${id}',${i})" style="background:transparent;border:none;color:#ef4444;font-size:11px;cursor:pointer;font-family:Georgia,serif">✕ Remove</button></div><div style="font-size:10px;color:#6a4a9a;margin-bottom:4px">Question text</div><textarea oninput="editorSetQuizQ('${id}',${i},this.value)" rows="2" style="width:100%;background:#0d0d1a;border:1px solid #2a2a4a;border-radius:7px;padding:8px;color:#e8e0ff;font-size:12px;font-family:Georgia,serif;outline:none;resize:vertical;box-sizing:border-box;margin-bottom:8px">${(q.q||'').replace(/</g,'&lt;')}</textarea><div style="font-size:10px;color:#6a4a9a;margin-bottom:5px">Options</div>${opts}<div style="font-size:10px;color:#6a4a9a;margin-top:8px;margin-bottom:4px">Explanation</div><textarea oninput="editorSetQuizExpl('${id}',${i},this.value)" rows="2" style="width:100%;background:#0d0d1a;border:1px solid #2a2a4a;border-radius:7px;padding:8px;color:#e8e0ff;font-size:12px;font-family:Georgia,serif;outline:none;resize:vertical;box-sizing:border-box">${(q.explanation||'').replace(/</g,'&lt;')}</textarea></div>`;
  }).join('');
}
function editorSetQuizExpl(id, qi, val) {
  const qs = editorGetQuizQuestions(id); qs[qi].explanation = val; saveActivityEdits(id, {quizQuestions: qs});
}
function editorRemoveQuiz(id, qi) {
  const qs = editorGetQuizQuestions(id); qs.splice(qi,1); saveActivityEdits(id, {quizQuestions: qs}); showActivityEditor(id);
}
function editorAddQuiz(id) {
  const qs = editorGetQuizQuestions(id);
  qs.push({q:'',options:['','','',''],correct:0,explanation:''});
  saveActivityEdits(id, {quizQuestions: qs}); showActivityEditor(id);
}

// Treatment helpers
function editorGetTreatments(id) {
  return JSON.parse(JSON.stringify(getActivity(id).treatments || []));
}
function editorSetTreatLabel(id, ti, val) {
  const ts = editorGetTreatments(id); ts[ti].label = val; saveActivityEdits(id, {treatments: ts});
}
function editorToggleTreatCorrect(id, ti) {
  const ts = editorGetTreatments(id); ts[ti].correct = !ts[ti].correct; saveActivityEdits(id, {treatments: ts}); showActivityEditor(id);
}
function editorRemoveTreat(id, ti) {
  const ts = editorGetTreatments(id); ts.splice(ti,1); saveActivityEdits(id, {treatments: ts}); showActivityEditor(id);
}
function editorAddTreat(id) {
  const ts = editorGetTreatments(id);
  ts.push({label:'',correct:true});
  saveActivityEdits(id, {treatments: ts}); showActivityEditor(id);
}

function updateYTPreview(id) {
  const ytEl = document.getElementById('ed-youtube');
  if (!ytEl) return;
  editorSave(id);
  const ytId = ytEl.value.trim();
  const preview = document.getElementById('yt-preview');
  if (preview && ytId) preview.src = `https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1`;
}

function tryAdminUnlock() {
  const pin = document.getElementById('admin-pin-input').value;
  if (pin === '1234') { adminUnlocked = true; showAdminDashboard(); }
  else document.getElementById('admin-pin-err').textContent = 'Incorrect PIN';
}

function showAdminDashboard(tab='overview') {
  const panel = document.getElementById('admin-panel');
  const tabs = ['overview','stations','rescues','add'].map(t =>
    `<button class="admin-tab ${t===tab?'active':''}" onclick="showAdminDashboard('${t}')">${
      {overview:'📊 Overview',stations:'👁 Stations',rescues:'🚨 Rescues',add:'➕ Add'}[t]
    }</button>`
  ).join('');

  let content = '';
  if (tab === 'overview') {
    const editBtnStyle = editModeActive
      ? 'width:100%;padding:12px;border-radius:10px;font-family:Georgia,serif;font-size:13px;font-weight:bold;cursor:pointer;border:1px solid #22c55e;color:#86efac;background:#0d2a14'
      : 'width:100%;padding:12px;border-radius:10px;font-family:Georgia,serif;font-size:13px;font-weight:bold;cursor:pointer;border:1px solid #a855f7;color:#c084fc;background:transparent';
    content = `
      <div style="display:flex;flex-direction:column;gap:8px;padding:12px 14px">

        <!-- DRAG TO REPOSITION SECTION -->
        <div style="background:#0d0a1a;border:1px solid #a855f744;border-radius:12px;padding:14px;margin-bottom:4px">
          <div style="font-size:10px;letter-spacing:2px;color:#a855f7;margin-bottom:8px">📍 REPOSITION ACTIVITIES</div>
          <div style="font-size:12px;color:#9a8aaa;line-height:1.6;margin-bottom:12px">
            Enable drag mode to move any activity marker to its exact real-world location on the map. Tap a marker to see its current coordinates. Lock positions when done.
          </div>
          <button id="edit-mode-btn" onclick="toggleEditMode()" style="${editBtnStyle}">
            ${editModeActive ? '🔒 Lock Positions' : '✋ Drag to Reposition'}
          </button>
          ${Object.keys(coordOverrides).length > 0 ? `
          <button onclick="exportPositions()" style="width:100%;margin-top:8px;padding:10px;border-radius:10px;font-family:Georgia,serif;font-size:12px;cursor:pointer;border:1px solid #7c3aed44;color:#7c3aed;background:transparent">
            📋 Export New Coordinates
          </button>
          <div style="font-size:10px;color:#6a4a7a;margin-top:6px;text-align:center">${Object.keys(coordOverrides).length} location${Object.keys(coordOverrides).length>1?'s':''} repositioned this session</div>
          ` : ''}
        </div>

        <!-- STATS -->
        ${[
          ['Behaviour stations (built-in)', OBS_STATIONS.length, '#0ea5e9'],
          ['Custom stations added', customStations.length, '#a855f7'],
          ['Rescue incidents', RESCUE_INCIDENTS.length, '#ef4444'],
          ['Observations completed', obsCompleted(), '#22c55e'],
          ['Rescues completed', rescueCompleted(), '#f59e0b'],
          ['Total student score', score, '#fde68a'],
        ].map(([l,v,c]) => `<div style="display:flex;justify-content:space-between;padding:8px 12px;background:#0d0d1a;border:1px solid ${c}22;border-radius:8px"><span style="font-size:12px;color:#c0c0d0">${l}</span><span style="font-size:14px;font-weight:bold;color:${c}">${v}</span></div>`).join('')}
      </div>`;
  } else if (tab === 'stations') {
    const allS = [...OBS_STATIONS, ...customStations];
    content = `<div style="padding:12px 14px;overflow-y:auto;max-height:calc(100vh - 160px)">` + allS.map(s => `
      <div style="background:#0d0d1a;border:1px solid ${s.colour}33;border-left:3px solid ${s.colour};border-radius:10px;padding:10px 12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:13px;font-weight:bold;color:#f0fdf4">${s.emoji} ${s.title}</div>
            <div style="font-size:10px;color:#6b9e70;margin-top:2px">${s.activityLabel} · Worksheet ${s.activity}</div>
            <div style="font-size:10px;color:${s.colour};margin-top:2px">YT: ${s.youtubeId||'(not set)'}</div>

          </div>
          <div>
            <span style="font-size:9px;padding:2px 6px;border-radius:4px;background:${s.colour}22;color:${s.colour}">${getCoords(s).lat.toFixed(4)}, ${getCoords(s).lng.toFixed(4)}</span>
            <button onclick="showActivityEditor('${s.id}')" style="display:block;margin-top:6px;background:#1a1a3a;border:1px solid #4a3a8a;border-radius:5px;padding:3px 10px;color:#c084fc;font-size:10px;cursor:pointer;font-family:'Georgia',serif">✏️ Edit</button>
            ${customStations.find(c=>c.id===s.id)?`<button onclick="removeCustomStation('${s.id}')" style="display:block;margin-top:6px;background:#1a0a0a;border:1px solid #ef444433;border-radius:5px;padding:3px 8px;color:#fca5a5;font-size:10px;cursor:pointer;font-family:'Georgia',serif">🗑️ Remove</button>`:''}
          </div>
        </div>
      </div>`).join('') + '</div>';
  } else if (tab === 'rescues') {
    content = `<div style="padding:12px 14px">` + RESCUE_INCIDENTS.map(r => {
      const sc = SEV[r.severity]||SEV.MEDIUM;
      const rs = rescueState[r.id]||{};
      return `<div style="background:#0d0d1a;border:1px solid ${sc.border}22;border-left:3px solid ${sc.border};border-radius:10px;padding:10px 12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:13px;font-weight:bold;color:#f0fdf4">${r.emoji} ${r.animal}</div>
            <div style="font-size:10px;color:#6b9e70">${r.location}</div>
            <span style="font-size:9px;padding:2px 5px;border-radius:3px;background:${sc.bg};color:${sc.text}">${sc.icon} ${r.severity}</span>
          </div>
          <div style="text-align:right">
            <div style="font-size:10px;color:${rs.rescued?'#22c55e':rs.found?'#60a5fa':'#4a4a7a'};margin-bottom:5px">
              ${rs.rescued?'✅ Rescued':rs.found?'🔍 Found':'⚪ Not found'}

            <button onclick="showActivityEditor('${r.id}')" style="background:#1a1a3a;border:1px solid #4a3a8a;border-radius:5px;padding:3px 10px;color:#c084fc;font-size:10px;cursor:pointer;font-family:'Georgia',serif">✏️ Edit</button>

        </div>

    }).join('') + '</div>';
  } else if (tab === 'add') {
    content = `
      <div style="padding:12px 14px;overflow-y:auto;max-height:calc(100vh - 160px)">
        <div style="font-size:10px;color:#a855f7;letter-spacing:2px;margin-bottom:10px">ADD CUSTOM OBSERVATION STATION</div>
        <div style="font-size:11px;color:#4a4a7a;margin-bottom:12px">Click on the map (behind this panel) after filling in coordinates, or enter lat/lng manually.</div>
        ${[
          {id:'cs-title',label:'Station Title',placeholder:'e.g. Library Pond — Ducks'},
          {id:'cs-yt',label:'YouTube Video ID',placeholder:'e.g. dQw4w9WgXcQ'},
          {id:'cs-lat',label:'Latitude',placeholder:'e.g. -27.5590'},
          {id:'cs-lng',label:'Longitude',placeholder:'e.g. 151.9505'},
          {id:'cs-activity',label:'Worksheet Activity Code',placeholder:'e.g. B3'},
          {id:'cs-label',label:'Activity Label',placeholder:'e.g. Scan Sampling'},
          {id:'cs-desc',label:'Description',placeholder:'What will students observe here?'},
        ].map(f=>`
          <div style="margin-bottom:10px">
            <label class="field-label">${f.label}</label>
            <input id="${f.id}" class="field-input" type="text" placeholder="${f.placeholder}" style="border-color:#2a1a4a;background:#0d0d1a;color:#e8d5ff"/>
          </div>`).join('')}
        <div style="margin-bottom:10px">
          <label class="field-label">Zone</label>
          <select id="cs-zone" class="field-input" style="border-color:#2a1a4a;background:#0d0d1a;color:#e8d5ff;cursor:pointer">
            <option value="CAMPUS">UniSQ Campus</option>
            <option value="JAPANESE GARDEN">Ju Raku En</option>
          </select>
        </div>
        <button onclick="saveCustomStation()" style="width:100%;background:linear-gradient(135deg,#14532d,#166534);border:1px solid #22c55e;border-radius:10px;padding:14px;color:#f0fdf4;font-family:'Georgia',serif;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:8px">✅ Add Station to Map</button>
      </div>`;
  }

  panel.innerHTML = `
    <div style="padding:12px 16px 0;background:linear-gradient(180deg,#08080f 0%,transparent 100%);border-bottom:1px solid #1a1a3a">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <div style="font-size:9px;letter-spacing:3px;color:#a855f7;text-transform:uppercase">Lecturer Admin</div>
          <div style="font-size:18px;font-weight:bold;color:#f0fdf4">🛠️ Activity Manager</div>
        </div>
        <button onclick="document.getElementById('admin-panel').className=''" style="background:transparent;border:1px solid #2a1a4a;border-radius:8px;padding:6px 12px;color:#6a4a9a;font-size:11px;cursor:pointer;font-family:'Georgia',serif">Exit Admin</button>
      </div>
      <div style="display:flex;gap:5px;padding-bottom:12px">${tabs}</div>
    </div>
    ${content}`;
  panel.className = 'show';
}

function saveCustomStation() {
  const get = id => document.getElementById(id)?.value?.trim() || '';
  const title = get('cs-title'), yt = get('cs-yt'), lat = parseFloat(get('cs-lat')), lng = parseFloat(get('cs-lng'));
  if (!title || !yt || isNaN(lat) || isNaN(lng)) {
    alert('Please fill in Title, YouTube ID, Latitude and Longitude.');
    return;
  }
  const station = {
    id: `custom_${Date.now()}`, lat, lng, type:'observe',
    title, zone: get('cs-zone') || 'CAMPUS',
    emoji:'🔍', colour:'#a855f7',
    activity: get('cs-activity') || 'B1',
    activityLabel: get('cs-label') || 'Observation',
    youtubeId: yt, desc: get('cs-desc') || '',
    behaviourFocus:[], worksheetFields:[{id:'notes',label:'Field notes',type:'textarea',placeholder:'Record your observations…'}],
    unlockMessage:'Observation complete!',
  };
  customStations.push(station);
  addMarker(station);
  updateScoreStrip();
  showAdminDashboard('stations');
}

function removeCustomStation(id) {
  customStations = customStations.filter(s => s.id !== id);
  if (leafletMarkers[id]) { map.removeLayer(leafletMarkers[id]); delete leafletMarkers[id]; }
  showAdminDashboard('stations');
}


// ─── INIT ─────────────────────────────────────────────────────────────────────

function openDrawer(){
  document.getElementById('bottom-sheet').classList.remove('hidden');
  document.getElementById('drawer-overlay').classList.add('show');
}
function closeDrawer(){
  document.getElementById('bottom-sheet').classList.add('hidden');
  document.getElementById('drawer-overlay').classList.remove('show');
}
function resizeMap(){
  var el=document.getElementById('map');
  if(!el) return;
  el.style.width=window.innerWidth+'px';
  el.style.height=window.innerHeight+'px';
  if(typeof map!=='undefined'&&map) map.invalidateSize(true);
}
window.addEventListener('resize',function(){setTimeout(resizeMap,100);});
window.addEventListener('orientationchange',function(){setTimeout(resizeMap,300);});
window.onload=function(){
  resizeMap();
  initMap();
  initGPS();
  updateScoreStrip();
  setTimeout(resizeMap,200);
  setTimeout(resizeMap,600);
  // Don't auto-open the drawer — let the user tap the menu button
};
</script>
